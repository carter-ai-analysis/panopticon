// ═══ 历史下拉菜单渲染 — 30天活跃 + 归档 ═══
function histLinks() {
  var registry = HIST_REGISTRY[ACTIVE] || [];
  var now = new Date();
  var cutoff = new Date(now);
  cutoff.setDate(cutoff.getDate() - 30);

  // Split: active (≤30d) vs archived (>30d)
  var active = [];
  var archived = [];
  registry.forEach(function(e) {
    // Check if entry has explicit archived flag
    if (e.archived) {
      archived.push(e);
    } else {
      // Try to parse date from label
      var dateMatch = e.label ? e.label.match(/^(\d{4}-\d{2}-\d{2})/) : null;
      if (dateMatch) {
        var entryDate = new Date(dateMatch[1]);
        if (entryDate < cutoff) {
          archived.push(e);
        } else {
          active.push(e);
        }
      } else {
        active.push(e);
      }
    }
  });

  var s = '';

  // ── 当前数据条目（始终显示，等同于"返回最新数据"）──
  var curData = null, curLabel = '', curDate = '';
  if (ACTIVE === 'daily' && ORIG_DATA.daily) {
    curDate = ORIG_DATA.daily.generatedAt || new Date().toISOString().slice(0,10);
    curLabel = curDate;
  } else if (ACTIVE === 'research' && ORIG_DATA.research) {
    curDate = ORIG_DATA.research.date || new Date().toISOString().slice(0,10);
    curLabel = curDate;
  } else if (ACTIVE === 'deepdive' && ORIG_DATA.deepDive) {
    curDate = ORIG_DATA.deepDive.date || '';
    curLabel = (ORIG_DATA.deepDive.name || '深度挖掘') + (curDate ? ' · ' + curDate : '');
  } else if (ACTIVE === 'free' && ORIG_DATA.freeAnalysis) {
    curDate = ORIG_DATA.freeAnalysis.date || '';
    // 截断过长的title
    var ft = ORIG_DATA.freeAnalysis.title || '自由分析';
    curLabel = (ft.length > 20 ? ft.slice(0,20)+'…' : ft) + (curDate ? ' · ' + curDate : '');
  }

  if (!active.length && !archived.length && !curLabel) {
    s += '<div class="hdd-empty">暂无历史记录</div>';
  }

  // ── 当前数据（等同于"返回最新数据"，始终显示在最前面）──
  if (curLabel) {
    s += '<div class="hdd-header">📅 近30天记录</div>';
    s += '<div class="hdd-item" onclick="backToLatest()">';
    s += '<span class="hdd-date">'+(curDate || '当前')+'</span>';
    s += '<span class="hdd-label">'+curLabel+'</span>';
    s += '</div>';
  }

  // ── 历史注册表条目（活跃区 ≤30天）──
  if (active.length > 0) {
    if (!curLabel) s += '<div class="hdd-header">📅 近30天记录</div>';
    active.forEach(function(e, i) {
      var stem = e.date; // e.date already is the full filename stem (e.g., "2026-07-12_全持仓策略4标综合")
      // Extract display date from label (always starts with YYYY-MM-DD)
      var dm = e.label.match(/^(\d{4}-\d{2}-\d{2})/);
      var displayDate = dm ? dm[1] : e.date.slice(0, 10);
      s += '<div class="hdd-item" onclick="loadHist(\''+stem+'\')">';
      s += '<span class="hdd-date">'+displayDate+'</span>';
      s += '<span class="hdd-label">'+e.label+'</span>';
      s += '</div>';
    });
  }

  // Archive section (>30 days)
  if (archived.length > 0) {
    s += '<div class="hdd-header hdd-arch-header">📦 归档记录 · ' + archived.length + '条</div>';
    archived.forEach(function(e) {
      var stem = e.date; // e.date already is the full filename stem
      var dm = e.label.match(/^(\d{4}-\d{2}-\d{2})/);
      var displayDate = dm ? dm[1] : e.date.slice(0, 10);
      s += '<div class="hdd-item hdd-archived" onclick="loadHist(\''+stem+'\')">';
      s += '<span class="hdd-date">'+displayDate+'</span>';
      s += '<span class="hdd-label">'+e.label+'</span>';
      s += '</div>';
    });
  }

  // Back to latest (when in history mode)
  if (HIST_MODE) {
    s += '<div class="hdd-item hdd-back" onclick="backToLatest()">← 返回最新数据</div>';
  }

  // Footer note
  s += '<div class="hdd-footer">📌 历史文件永久保留 · 30天自动归档</div>';
  return s;
}

// ═══ 归档文件可能用的变量名映射 ═══
var HIST_VAR_MAP = {
  daily: 'dailyData',
  research: 'researchData',
  deepdive: 'deepDiveData',
  free: 'freeAnalysisData'
};

function loadHist(stem) {
  var dd = document.getElementById('hdd');
  if (dd) dd.classList.remove('show');

  var tabDir = ACTIVE === 'deepdive' ? 'deep_dive' : ACTIVE === 'free' ? 'free_analysis' : ACTIVE;
  var url = 'data/' + tabDir + '/' + encodeURIComponent(stem) + '.js';
  var varName = HIST_VAR_MAP[ACTIVE];
  var p = document.getElementById('pc');

  // Use fetch instead of dynamic script for reliability
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      // Execute in isolated scope, extract the variable
      var fn = new Function(text + '; return ' + varName + ';');
      var histData = fn();
      if (!histData) {
        throw new Error('数据为空');
      }
      // Update DATA with history
      if (ACTIVE === 'daily') DATA.daily = histData;
      else if (ACTIVE === 'research') DATA.research = histData;
      else if (ACTIVE === 'deepdive') DATA.deepDive = histData;
      else if (ACTIVE === 'free') DATA.freeAnalysis = histData;
      HIST_MODE = true;
      window._histLoading = true;
      switchTab(ACTIVE);
      window._histLoading = false;
    })
    .catch(function(e) {
      if (p) {
        var backBtn = HIST_MODE
          ? '<div class="hdd-item hdd-back" style="display:inline-block;margin-top:16px;padding:10px 20px;border-top:none;cursor:pointer" onclick="backToLatest()">← 返回最新数据</div>'
          : '';
        p.innerHTML = '<div class="card" style="text-align:center;padding:48px 24px"><h2 style="justify-content:center">历史数据加载失败</h2><p style="color:var(--tx2);font-size:13px;margin-top:12px">'+e.message+'</p><p style="color:var(--tx3);font-size:12px;margin-top:8px">路径: '+url+'</p>'+backBtn+'</div>';
      }
    });
}

function backToLatest() {
  // Restore original data
  DATA = JSON.parse(JSON.stringify(ORIG_DATA));
  HIST_MODE = false;
  var dd = document.getElementById('hdd');
  if (dd) dd.classList.remove('show');
  switchTab(ACTIVE);
}

/* ═══ SMART COLORIZE v4.2 — 表格td + 描述文本 + 进度条数值继承柱色 ═══ */
function smartColorize(panel) {
  if (!panel) return;

  function _colorPct(html) {
    var o = html;
    // Pass 1: Threshold symbols ≤ ≥ → neutral gold
    html = html.replace(/([≤≥])(\d+(?:\.\d+)?%)/g, '$1<span class="price">$2</span>');
    // Pass 2: ~ approximate values → neutral gold (incl ~-XX%), skip if already contains span
    html = html.replace(/~([+-]?\d+(?:\.\d+)?%)/g, function(m, pct) {
      return '~<span class="price">' + pct + '</span>';
    });
    // Pass 3: Signed pure percentages, NOT part of ranges, NOT inside existing spans
    html = html.replace(
      /(?<![-\d.<])([+-])(\d+(?:\.\d+)?)%(?![-\d>])/g,
      function(m, sign, num) {
        return '<span class="' + (sign === '+' ? 'up' : 'dn') + '">' + m + '</span>';
      }
    );
    return html===o?null:html;
  }
  function _skip(el){
    if(!el)return true;
    if(el.closest('.ai,.bl,.br2'))return true;
    // 修复：原选择器 .span.dn 是错误的class（应为 span.dn）
    if(el.querySelector('span.up, span.dn, span.price'))return true;
    var s=el.getAttribute('style');
    // 已有内联color样式 → 不重复着色（但确保负数是绿色）
    if(s&&s.indexOf('color')!==-1)return true;
    return false;
  }
  function _barToText(bg){
    if(!bg)return null;
    var b=bg.toLowerCase();
    if(b.indexOf('#22c5')>=0||b.indexOf('#34d3')>=0||b.indexOf('green')>=0||b.indexOf('rgb(34,')>=0||b.indexOf('rgb(52,')>=0)return'var(--green)';
    if(b.indexOf('#ef44')>=0||b.indexOf('#f59')>=0||b.indexOf('#ea58')>=0||b.indexOf('amber')>=0||b.indexOf('red')>=0||b.indexOf('rgb(239,')>=0||b.indexOf('rgb(245,')>=0||b.indexOf('rgb(234,')>=0||b.indexOf('rgb(251,')>=0)return'var(--gold)';
    if(b.indexOf('#5b8f')>=0||b.indexOf('#3b82')>=0||b.indexOf('blue')>=0||b.indexOf('rgb(91,')>=0||b.indexOf('rgb(59,')>=0)return'var(--blue)';
    return null;
  }

  /* ① td表格着色 */
  panel.querySelectorAll('td').forEach(function(td){
    if(_skip(td))return; var h=td.innerHTML;if(!h||!h.trim())return;
    var r=_colorPct(h);if(r)td.innerHTML=r;
  });
  /* ② 非表格文本着色 — 合并为单次querySelectorAll */
  panel.querySelectorAll('.br-v,.mr-v,.mr-d,.ev-t,.ev-b,.cl-b').forEach(function(el){
      if(_skip(el))return; var h=el.innerHTML;if(!h||!h.trim())return;
      var r=_colorPct(h);if(r)el.innerHTML=r;
    });
  /* ③ 进度条数值继承柱子语义色：.br-v ↔ 同行.br-f背景色→文字色 */
  panel.querySelectorAll('.brw').forEach(function(row){
    var bar=row.querySelector('.br-f'),val=row.querySelector('.br-v');
    if(!bar||!val)return;
    if(val.querySelector('span.up, span.dn'))return;
    var s=val.getAttribute('style');if(s&&s.indexOf('color')!==-1)return;
    var tc=_barToText(bar.style.background||bar.style.backgroundColor);
    if(tc)val.style.color=tc;
  });
  /* ④ Dashboard卡片语义着色 */
  panel.querySelectorAll('.dc .v').forEach(function(el){
    if(el.querySelector('span.up, span.dn'))return;
    var s=el.getAttribute('style');if(s&&s.indexOf('color')!==-1)return;
    var t=el.textContent.trim();
    if(/^\+/.test(t)||/涨/.test(t))el.style.color='var(--red)';
    else if(/^-/.test(t)||/跌/.test(t))el.style.color='var(--green)';
    else if(/^~/.test(t))el.style.color='var(--tx2)';
  });
  /* ⑤ EVENT TAGS: 统一琥珀高亮 */
  panel.querySelectorAll('.et').forEach(function(el){
    var cls=el.className;
    if(/ei|eh|ec|em|ek/.test(cls))return;
    el.style.cssText+='background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.18);';
  });
}

  var p = document.getElementById('pc');
  try {
    if (type === 'daily') renderDaily(DATA.daily, p);
    else if (type === 'research') renderResearch(DATA.research, p);
    else if (type === 'deepdive') renderDeepDive(DATA.deepDive, p);
    else if (type === 'free') renderFreeAnalysis(DATA.freeAnalysis, p);
  } catch(err) {
    p.innerHTML = '<div class="card" style="border-left:4px solid var(--red)"><h2>渲染错误</h2><pre style="font-size:11px;white-space:pre-wrap;color:var(--red)">'+err.message+'</pre></div>';
    console.error(err);
  }
  /* 渲染完成后统一智能着色（红涨绿跌 + 价格金色）*/
  try { smartColorize(p); } catch(e) { console.error('smartColorize error:', e); }

  // ═══ 导航栏增强：进度条 + section锚点 ═══
  var snavCards = [];
  try { (function enhanceNav() {
    // 1. 进度条
    if (!document.querySelector('.prog')) {
      var prog = document.createElement('div');
      prog.className = 'prog';
      document.body.appendChild(prog);
    }

    // 2. 遍历所有 section 标题（h2 + .mod-hd）→ 找容器（兼容4个tab）
    var headers = p.querySelectorAll('h2, .mod-hd');
    snavCards = [];
    var items = [];
    headers.forEach(function(hdr, idx) {
      var container, title;
      if (hdr.classList.contains('mod-hd')) {
        // 研报：.mod-hd 的容器是父级 .mod
        container = hdr.closest('.mod');
        title = hdr.textContent.trim().substring(0, 14);
      } else {
        // 日报/深度挖掘/自由分析：h2 的容器是 card/card-dark/mod 或 h2 自身
        container = hdr.closest('.card, .card-dark, .mod') || hdr;
        title = hdr.textContent.trim().substring(0, 14);
      }
      if (!container) return;
      if (!container.id) container.id = 'sec-' + type + '-' + idx;
      title = title.replace(/'/g,"\\'").replace(/"/g,'');
      snavCards.push(container);
      items.push('<a href="#'+container.id+'" onclick="event.preventDefault();window._pnv=1;panHighlight(this,\''+container.id+'\');var t=document.getElementById(\''+container.id+'\');if(t)t.scrollIntoView({behavior:\'smooth\',block:\'start\'});setTimeout(function(){window._pnv=0;},600);return false;">'+title+'</a>');
    });

    // 3. 导航栏 DOM
    var existing = document.querySelector('.snav');
    if (existing) existing.remove();
    if (items.length > 0) {
      var snav = document.createElement('div');
      snav.className = 'snav';
      snav.innerHTML = items.join('');
      var topbar = document.querySelector('.topbar');
      if (topbar && topbar.parentNode) {
        topbar.parentNode.insertBefore(snav, topbar.nextSibling);
      }
    }

    // 4. 滚动 handler
    var prevHandler = window._panopticon_scroll_handler;
    if (prevHandler) window.removeEventListener('scroll', prevHandler);

    function onScroll() {
      var d = document.documentElement, pct = 0;
      if (d.scrollHeight > d.clientHeight) pct = (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100;
      var pg = document.querySelector('.prog');
      if (pg) pg.style.width = Math.min(pct, 100) + '%';
      if (window._pnv) return;
      for (var j = 0; j < snavCards.length; j++) {
        var r = snavCards[j].getBoundingClientRect();
        if (r.top > 0 && r.top < window.innerHeight * 0.5) {
          panHighlight(null, snavCards[j].id);
          return;
        }
      }
      if (snavCards.length > 0) panHighlight(null, snavCards[0].id);
    }

    window._panopticon_scroll_handler = onScroll;
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  })(); } catch(e) { console.error('enhanceNav error:', e); }

  // ═══ 统一页脚：数据源标注 + 触发规则 ═══
  var ds = getDataSourceInfo(type);
  var footer = '<div class="uf"><div class="uf-top">';
  footer += '<div class="uf-src"><span class="uf-badge">🔬 ' + ds.skill + '</span>';
  footer += '<span class="uf-info">数据：' + ds.sources + '</span>';
  footer += '<span class="uf-info">深度：' + ds.depth + '</span></div>';
  footer += '</div>';
  footer += '<div class="uf-rules">';
  footer += '<span class="uf-title">⚡ 触发规则</span>';
  footer += '<code>生成日报并部署：</code><code>生成研报并部署：</code><code>深度挖掘并部署：标的</code><code>自由分析并部署：问题</code><code>部署到网页</code>';
  footer += '<span style="color:var(--tx3);font-size:9.5px;margin-left:6px">其他对话不部署</span>';
  footer += '</div>';
  footer += '<div class="ft">PANOPTICON · AI独立研判 · 不构成投资建议</div></div>';
  p.innerHTML += footer;
}

// Init — create container then render
(function init() {
  var root = document.createElement('div');
  root.id = 'app-root';
  document.body.appendChild(root);
  try {
    if (typeof dailyData !== 'undefined') { switchTab('daily'); }
    else if (typeof deepDiveData !== 'undefined') { switchTab('deepdive'); }
    else if (typeof researchData !== 'undefined') { switchTab('research'); }
    else if (typeof freeAnalysisData !== 'undefined') { switchTab('free'); }
    else { root.innerHTML = '<div class="wrap"><div class="empty"><h3>PANOPTICON</h3><p>运行「生成日报」获取数据</p></div></div>'; }
  } catch(e) {
    // Fallback: render minimal UI with navigation if primary tab fails
    var fallback = '<div class="wrap"><div class="topbar"><div class="tn">';
    fallback += '<a onclick="switchTab(\'daily\')">📊 日报</a>';
    fallback += '<a onclick="switchTab(\'research\')">📋 研报</a>';
    fallback += '<a onclick="switchTab(\'deepdive\')">⛏ 深度挖掘</a>';
    fallback += '<a onclick="switchTab(\'free\')">🧠 自由分析</a>';
    fallback += '</div></div>';
    fallback += '<div id="pc"><div class="card" style="border-left:4px solid var(--red)">';
    fallback += '<h2>日报渲染异常</h2><p>日报数据加载失败·请尝试切换至其他Tab查看内容</p>';
    fallback += '<pre style="font-size:11px;color:var(--red)">' + e.message + '</pre>';
    fallback += '</div></div></div>';
    root.innerHTML = fallback;
    console.error('PANOPTICON init error:', e);
  }
})();
</script>
</body>
</html>
