<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PANOPTICON · AI全球资产配置</title>
<style>
/* ══════════════════════════════════════════════════════════════
   PANOPTICON v11 — 投行IPO级暗色终端 · 设计DNA来源：专业投顾仪表盘
   核心原则：近黑底 + 三层卡片深度 + 金色数据系统 + 高对比文字
   ══════════════════════════════════════════════════════════════ */

/* ═══ DESIGN TOKENS ═══ */
:root {
  /* Canvas — 近黑海军蓝（比v10深一个档次）*/
  --bg: #0a0e1a;

  /* Card surfaces — 三层深度系统 */
  --card: #111827;          /* Level 1: 主内容卡片 */
  --card-in: #161f2d;       /* Level 2: 内嵌卡片(风险项/子模块) */
  --card-hi: #1c2638;       /* Level 3: hover/highlight */

  /* Text hierarchy — 高对比度可读性优先 */
  --tx: #e8ecf4;            /* 主文字（标题/重要内容）— 近白 */
  --tx-title: #e8ecf4;       /* 自由格式标题 — 与 --tx 相同 */
  --tx-body: #b4bcc8;        /* 正文（段落/描述）— 可读灰 */
  --tx2: #8896ab;           /* 辅助文字（标签/副标题）— 中灰蓝 */
  --tx3: #5a6577;           /* 弱化文字（提示/占位）— 深灰 */
  --tx4: #3a4556;           /* 极弱化（placeholder级别）*/
  
  /* Fonts */
  --font-mono: "SF Mono", Menlo, Consolas, monospace;

  /* Borders — 极微妙，几乎不可见 */
  --line: rgba(255,255,255,.06);      /* 卡片边框 */
  --line-hover: rgba(255,255,255,.10); /* hover时稍明显 */
  --line-strong: rgba(255,255,255,.14); /* 分隔线/表头底线 */

  /* Semantic colors — 保持中国股市习惯 */
  --red: #ef4444;
  --green: #22c55e;

  /* Accent palette — 从截图中提取的完整色板 */
  --gold: #d4a853;           /* ★ 核心强调色：大数字/价格/评分/激活态 */
  --gold-dim: rgba(212,168,83,.12);
  --gold-glow: rgba(212,168,83,.20);

  --blue: #5b8fde;           /* 次要数据/图表柱 */
  --blue-dim: rgba(91,143,222,.12);

  --cyan: #38bdf8;           /* 折线图/时间线 */
  --green-accent: #34d399;   /* 正面指标/绿色类别条 */
  --purple: #a78bfa;         /* 紫色类别条/AI面板 */
  --amber: #f59e0b;          /* 警告/中等严重度 */
  --orange: #ea580c;         /* 触发/信号 */

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
}

/* ═══ RESET & BASE ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Inter", -apple-system, "PingFang SC", "Noto Sans SC",
               "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--tx-body);
  font-size: 14px;
  line-height: 1.68;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.wrap { max-width: 1120px; margin: 0 auto; padding: 24px 28px 56px; }
@media (max-width: 768px) { .wrap { padding: 14px 16px 40px; } }

/* ═══ BANNER — 导航顶栏（与页面底色有明显区隔·悬浮感）═══ */
.banner {
  background: linear-gradient(180deg, rgba(20,28,46,.95) 0%, #111827 100%);
  border-radius: 0 0 16px 16px;
  padding: 32px 36px 24px;
  margin-bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
/* 顶部极光扫描线 */
.banner::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 100%;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%, var(--cyan) 30%, var(--gold) 50%, var(--purple) 70%, transparent 100%);
  animation: auroraScan 4s ease-in-out infinite;
}
@keyframes auroraScan {
  0% { left: -100%; right: 100%; opacity: 0; }
  20% { opacity: 1; }
  80% { left: 10%; right: 10%; opacity: .8; }
  100% { left: 110%; right: -10%; opacity: 0; }
}

/* ═══ 品牌标题 — 炫酷大字 ═══ */
.brand-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.brand {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  line-height: 1;
  /* 多层渐变：白→金→琥珀，带金属质感 */
  background: linear-gradient(
    135deg,
    #ffffff 0%,
    #f0e6d3 15%,
    var(--gold) 35%,
    #f59e0b 55%,
    #d97706 75%,
    var(--gold) 90%,
    #fff 100%
  );
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: brandShimmer 5s ease-in-out infinite, brandGlow 3s ease-in-out infinite alternate;
  filter: drop-shadow(0 2px 8px rgba(212,168,83,.35)) drop-shadow(0 0 40px rgba(212,168,83,.12));
  user-select: none;
}
@keyframes brandShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes brandGlow {
  0% { filter: drop-shadow(0 2px 8px rgba(212,168,83,.35)) drop-shadow(0 0 40px rgba(212,168,83,.12)); }
  100% { filter: drop-shadow(0 2px 12px rgba(212,168,83,.5)) drop-shadow(0 0 60px rgba(212,168,83,.2)); }
}
.brand-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--tx3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding-left: 4px;
}
.bs-icon {
  color: var(--gold);
  font-size: 8px;
  vertical-align: middle;
}
.bs-sep {
  color: var(--line-strong);
  margin: 0 4px;
}
.bs-status {
  color: var(--green-accent);
  font-weight: 700;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 11px;
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .5; }
}
/* ═══ 历史下拉增强样式（v12）═══ */
.hdd-header {
  font-size: 11px;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 10px 14px 6px;
  border-bottom: 1px solid var(--line);
  font-weight: 600;
}
.hdd-date {
  display: block;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--gold);
  font-weight: 600;
}
.hdd-label {
  display: block;
  font-size: 13px;
  color: var(--tx2);
  margin-top: 1px;
}
.hdd-back {
  border-top: 2px solid var(--line) !important;
  color: var(--cyan) !important;
  font-weight: 700 !important;
  margin-top: 4px !important;
}


@media (max-width: 768px) {
  .banner { flex-direction: column; gap: 14px; align-items: flex-start; padding: 24px 16px 20px; }
  .brand { font-size: 28px; letter-spacing: 4px; }
  .brand-sub { font-size: 11px; letter-spacing: 1.5px; }
}

/* ═══ TOP BAR — Tab导航 + 时间 + 历史 ═══ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 24px 0 18px;
}
.tn {
  display: flex;
  gap: 3px;
  background: var(--card);
  border-radius: 10px;
  padding: 4px;
  border: 1px solid var(--line);
}
.tn a {
  padding: 9px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--tx2);
  text-decoration: none;
  transition: all .2s ease;
  letter-spacing: .1px;
}
.tn a:hover {
  color: var(--tx);
  background: var(--card-hi);
}
.tn a.act {
  background: linear-gradient(135deg, var(--gold), #c99530);
  color: #0a0e1a;
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(212,168,83,.25);
}
.tb-right { display: flex; align-items: center; gap: 10px; }
.tb-time {
  font-size: 12px;
  color: var(--tx2);
  padding: 6px 14px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--line);
}
.tb-time b { color: var(--tx); font-weight: 600; }

/* History dropdown */
.hw { position: relative; }
.hbtn {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--tx2);
  font-family: inherit;
  transition: all .15s ease;
}
.hbtn:hover { border-color: var(--gold); color: var(--gold); }
.hbtn::after { content: '\25BE'; font-size: 9px; margin-left: 4px; }
.hdd {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #151d2e;
  border: 1px solid var(--line-hover);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  min-width: 220px;
  z-index: 100;
  overflow: hidden;
}
.hdd.show { display: block; }
.hdd-item {
  display: block;
  padding: 11px 18px;
  font-size: 12px;
  color: var(--tx-body);
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.04);
  transition: background .12s;
}
.hdd-item:last-child { border-bottom: none; }
.hdd-item:hover { background: var(--card-hi); color: var(--gold); }
.hdd-arch-header {
  color: var(--tx3) !important;
  font-size: 10px !important;
  letter-spacing: 1px !important;
  border-top: 2px solid var(--line) !important;
}
.hdd-archived { opacity: 0.65; }
.hdd-archived:hover { opacity: 1; }
.hdd-footer {
  font-size: 10px;
  color: var(--tx3);
  text-align: center;
  padding: 10px 14px 12px;
  border-top: 1px solid var(--line);
}
.hdd-empty {
  padding: 24px 18px;
  color: var(--tx3);
  text-align: center;
  font-size: 12px;
  line-height: 1.8;
}

/* ═══ MARKET TABS — 4列市场切换（参考截图的tag chip风格）═══ */
.mt {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}
.mt-item {
  text-align: center;
  padding: 14px 8px 11px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .25s ease;
  border: 1px solid var(--line);
  background: var(--card);
  position: relative;
  overflow: hidden;
}
.mt-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--c, var(--blue));
  opacity: 0;
  transition: opacity .25s;
}
/* Market tab hover — each market gets its own accent color on hover */
.mt-item:hover {
  transform: translateY(-2px);
}
.mt-item:hover::before { opacity: .6; }
.mt-us:hover {
  border-color: rgba(91,143,222,.35);
  background: rgba(91,143,222,.06);
  box-shadow: 0 6px 24px rgba(91,143,222,.15);
}
.mt-hk:hover {
  border-color: rgba(245,158,11,.35);
  background: rgba(245,158,11,.06);
  box-shadow: 0 6px 24px rgba(245,158,11,.15);
}
.mt-kr:hover {
  border-color: rgba(167,139,250,.35);
  background: rgba(167,139,250,.06);
  box-shadow: 0 6px 24px rgba(167,139,250,.15);
}
.mt-cn:hover {
  border-color: rgba(34,197,94,.3);
  background: rgba(34,197,94,.05);
  box-shadow: 0 6px 24px rgba(34,197,94,.12);
}
.mt-item .s {
  font-size: 28px;
  font-weight: 800;
  display: block;
  line-height: 1.1;
}
.mt-item .l {
  font-size: 11px;
  color: var(--tx2);
  margin-top: 4px;
  letter-spacing: .2px;
}
/* Market tab active states — each market gets its own accent color */
.mt-us.act {
  border-color: rgba(91,143,222,.35);
  background: rgba(91,143,222,.08);
  color: #93bbfd;
  --c: #5b8fde;
}
.mt-us.act::before { background: #5b8fde; opacity: 1; }
.mt-hk.act {
  border-color: rgba(245,158,11,.35);
  background: rgba(245,158,11,.08);
  color: #fbbf24;
  --c: #f59e0b;
}
.mt-hk.act::before { background: #f59e0b; opacity: 1; }
.mt-kr.act {
  border-color: rgba(167,139,250,.35);
  background: rgba(167,139,250,.08);
  color: #c4b5fd;
  --c: #a78bfa;
}
.mt-kr.act::before { background: #a78bfa; opacity: 1; }
.mt-cn.act {
  border-color: rgba(34,197,94,.3);
  background: rgba(34,197,94,.07);
  color: #4ade80;
  --c: #22c55e;
}
.mt-cn.act::before { background: #22c55e; opacity: 1; }

/* ═══ CARDS — 三层深度卡片系统（核心组件）═══ */
.card {
  background: var(--card);
  border-radius: var(--r-lg);
  border: 1px solid var(--line);
  padding: 24px 26px;
  margin-bottom: 14px;
  overflow-x: auto;
  position: relative;
}
  padding: 24px 26px;
  margin-bottom: 16px;
  border: 1px solid var(--line);
  position: relative;
  transition: border-color .2s, box-shadow .2s;
  overflow-x: auto;           /* 表格溢出时横向滚动 */
  overflow-y: visible;        /* 纵向不裁剪（tooltip等）*/
}
.card:hover {
  border-color: var(--line-hover);
  box-shadow: 0 4px 28px rgba(0,0,0,.25);
}
.card h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--tx);
}
.card h2::before {
  content: '';
  width: 4px;
  height: 17px;
  border-radius: 2px;
  background: var(--gold);
  flex-shrink: 0;
}

/* card-dark — 用于研报头部等特殊区块 */
.card-dark {
  background: linear-gradient(135deg, #111827, #162033);
  color: var(--tx);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 24px 28px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.card-dark h2 { font-size: 18px; font-weight: 700; color: var(--tx); }
.card-dark h2::before { display: none; }
.card-dark .sub { font-size: 12.5px; opacity: .55; margin-top: 5px; color: var(--tx2); }

/* ═══ BADGES / TAGS / PILLS（参考截图中的severity badge和tag chip）═══ */
.bad {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .2px;
}
.br { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
.bg { background: rgba(34,197,94,.12); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
.bb { background: var(--blue-dim); color: #93b5f7; border: 1px solid rgba(91,143,222,.2); }
.ba { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }
.bp { background: rgba(167,139,250,.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,.2); }

/* ═══ TABLES — 全左对齐 + 暗色主题适配（关键！之前v10这里最乱）═══ */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: auto;
}
th {
  text-align: left;
  padding: 11px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--tx2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--line-strong);
  background: #0c1018;
  white-space: nowrap;
}
td {
  padding: 11px 14px;
  border-bottom: 1px solid rgba(255,255,255,.03);
  vertical-align: middle;
  text-align: left;
  color: var(--tx-body);
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,.02); }
tbody tr:hover td:first-child { color: var(--tx); }

/* 股市颜色约定 */
.up { color: var(--red); font-weight: 700; }
.dn { color: var(--green); font-weight: 700; }
/* 价格/金额 — 仅用于阈值百分比（由 smartColorize v3 自动添加）*/
.price { color: var(--gold); font-weight: 700; }
/* smartColorize v3 内嵌span — 只给涨跌百分比着色 */
td span.up, .mod-bd span.up { color: var(--red); font-weight: 700; }
td span.dn, .mod-bd span.dn { color: var(--green); font-weight: 700; }
/* 安全网：任何包含负数百分比的td（即使有内联样式）强制绿色 */
/* 表格中的普通数字保持默认色（var(--tx-body)），不再额外标注 */
.r-up { background: rgba(239,68,68,.05)!important; }
.r-dn { background: rgba(34,197,94,.05)!important; }
.r-wa { background: rgba(245,158,11,.05)!important; }
.r-in { background: var(--blue-dim)!important; }

/* ═══ K线表（7列 fixed）═══ */
.kline-tbl { table-layout: fixed; }
.kline-tbl col:nth-child(1) { width: 8%; }
.kline-tbl col:nth-child(2) { width: 15%; }
.kline-tbl col:nth-child(3) { width: 15%; }
.kline-tbl col:nth-child(4) { width: 15%; }
.kline-tbl col:nth-child(5) { width: 15%; }
.kline-tbl col:nth-child(6) { width: 14%; }
.kline-tbl col:nth-child(7) { width: 18%; }

/* ═══ 股票层级表 sl-tbl（5列）═══ */
.sl-tbl { table-layout: fixed; }
.sl-tbl col:nth-child(1) { width: 26%; }
.sl-tbl col:nth-child(2) { width: 14%; }
.sl-tbl col:nth-child(3) { width: 14%; }

.sl-tbl col:nth-child(5) { width: 32%; }

/* ═══ 研报 M1 景气仪表（4列·fixed+nowrap）═══ */
.mod-bd > table:first-of-type { table-layout: fixed; }
.mod-bd > table:first-of-type col:nth-child(1) { width: 7%; }
.mod-bd > table:first-of-type col:nth-child(2) { width: 13%; }
.mod-bd > table:first-of-type col:nth-child(3) { width: 9%; }
.mod-bd > table:first-of-type td:nth-child(1),
.mod-bd > table:first-of-type td:nth-child(2),
.mod-bd > table:first-of-type td:nth-child(3) { white-space: nowrap; }

/* ═══ 研报 M2 上游分析（5列）═══ */
.mod-bd .sec > table:first-of-type { table-layout: fixed; }
.mod-bd .sec > table:first-of-type col:nth-child(1) { width: 8%; }
.mod-bd .sec > table:first-of-type col:nth-child(2) { width: 20%; }
.mod-bd .sec > table:first-of-type col:nth-child(3) { width: 10%; }
.mod-bd .sec > table:first-of-type col:nth-child(4) { width: 11%; }
.mod-bd .sec > table:first-of-type td:nth-child(1),
.mod-bd .sec > table:first-of-type td:nth-child(2),
.mod-bd .sec > table:first-of-type td:nth-child(3),
.mod-bd .sec > table:first-of-type td:nth-child(4) { white-space: nowrap; }

/* ═══ SCORE CIRCLES — 评分圆环（参考截图#53的大分数展示）═══ */
.sc-row { display: flex; align-items: center; gap: 22px; margin-bottom: 18px; }
.sc {
  width: 84px; height: 84px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; flex-shrink: 0;
  box-shadow: 0 8px 28px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
}
.sc .n { font-size: 34px; line-height: 1; }
.sc .l { font-size: 10px; opacity: .85; margin-top: 3px; letter-spacing: .3px; }
.sc-info { flex: 1; }
.sc-info .h { font-size: 16px; font-weight: 600; margin-bottom: 5px; color: var(--tx); }
.sc-info .d { font-size: 13px; color: var(--tx2); line-height: 1.65; }

.mc {
  width: 58px; height: 58px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
}
.mc .n { font-size: 22px; line-height: 1; }
.mc .l { font-size: 8px; opacity: .8; }

/* ═══ PROGRESS BARS — 双色调轨道+填充（参考截图#53/#55的bar chart）═══ */
.brw { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 13px; }
.brw:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.br-n { width: 95px; font-weight: 500; flex-shrink: 0; color: var(--tx-body); }
/* 柱子：弹性填充，拉长靠近右侧 */
.br-t { flex: 1; min-width: 120px; max-width: 420px; height: 8px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; }
.br-f { display: block; height: 100%; border-radius: 4px; min-width: 4px; }
/* 实际观测值：名称和柱子之间的数值列 */
.br-av { width: 52px; text-align: center; font-weight: 700; color: var(--tx); flex-shrink: 0; font-size: 12px; }
/* 分数+描述：紧贴柱子，整体左对齐 */
.br-v { text-align: center; font-weight: 600; color: var(--tx); flex-shrink: 0; min-width: 30px; margin-right: 10px; }
/* 描述文字：左对齐·纯灰·不染色 */
.br-d { text-align: left; font-size: 11px; color: var(--tx3); white-space: normal; max-width: 280px; }

/* Market rows */
.mr { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 12.5px; }
.mr:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.mr-n { width: 90px; font-weight: 500; flex-shrink: 0; color: var(--tx-body); }
.mr-av { width: 100px; text-align: center; font-weight: 700; color: var(--tx); flex-shrink: 0; font-size: 12px; }
.mr-v { width: 48px; text-align: center; font-weight: 600; flex-shrink: 0; color: var(--tx); }
.mr-d { flex: 1; color: var(--tx2); font-size: 11.5px; }

/* Events */
.ev { padding: 9px 0; font-size: 12.5px; line-height: 1.65; }
.ev:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.et { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 6px; letter-spacing: .2px; }
.ev-t { font-weight: 600; color: var(--tx-body); }
.ev-b { color: var(--tx2); margin-top: 3px; font-size: 12px; }
.ei { background: rgba(167,139,250,.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,.18); }
.eh { background: var(--blue-dim); color: #93b5f7; border: 1px solid rgba(91,143,222,.18); }
.ec { background: rgba(56,189,248,.12); color: #67d5f5; border: 1px solid rgba(56,189,248,.18); }
.em { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.18); }
.ek { background: rgba(168,85,247,.12); color: #d8b4fe; border: 1px solid rgba(168,85,247,.18); }

/* Tags for currency */
.trmb { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--blue-dim); color: #93b5f7; white-space: nowrap; }
.thkd { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(245,158,11,.12); color: #fbbf24; white-space: nowrap; }

/* Sum bar */
.sb {
  display: flex; align-items: center; justify-content: space-between;
  background: #0c1018; border-radius: 10px;
  padding: 12px 18px; margin-top: 14px; font-size: 12.5px;
  border: 1px solid var(--line);
}
.sb .lbl { font-weight: 500; color: var(--tx2); }
.sb .val { font-size: 18px; font-weight: 800; color: var(--gold); }

/* Stock layers */
.sl { margin-bottom: 14px; border-radius: 10px; overflow: hidden; border: 1px solid var(--line); }
.sl-hd { font-size: 12px; font-weight: 600; padding: 9px 16px; color: #fff; }
.sl-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin: 0; }
.sl-tbl th { padding: 8px 12px; font-size: 11px; background: #0c1018; border-bottom: 1px solid var(--line); white-space: nowrap; text-align: left; color: var(--tx2); }
.sl-tbl td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.03); text-align: left; color: var(--tx-body); }
.sl-tbl tr:last-child td { border-bottom: none; }
.sl-tbl td:first-child, .sl-tbl th:first-child { white-space: nowrap; }

/* Phase pills & Panels */
.pt { display: inline-block; padding: 3px 11px; border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: .2px; }
.pt-a { background: rgba(245,158,11,.15); color: #fbbf24; }
.pt-b { background: var(--blue-dim); color: #93b5f7; }
.pt-c { background: rgba(34,197,94,.12); color: #4ade80; }

.pn { padding: 16px 20px; border-radius: 10px; margin: 12px 0; font-size: 13px; line-height: 1.75; }
.pn-a { background: rgba(239,68,68,.05); border: 1px solid rgba(239,68,68,.15); border-left: 4px solid var(--red); }
.pn-b { background: rgba(34,197,94,.05); border: 1px solid rgba(34,197,94,.15); border-left: 4px solid var(--green); }
.pn-c { background: var(--blue-dim); border: 1px solid rgba(91,143,222,.15); border-left: 4px solid var(--blue); }
.pn-d { background: rgba(167,139,250,.06); border: 1px solid rgba(167,139,250,.15); border-left: 4px solid var(--purple); }

/* ═══ AI / Note / Alert PANELS（参考截图#57的风险提示卡片风格）═══ */
.ai {
  background: rgba(139,92,246,.06);
  border: 1px solid rgba(167,139,250,.15);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 13px;
  line-height: 1.85;
  color: var(--tx-body);  /* 正文用灰白，不是全紫色 */
}
/* AI面板内标题/加粗 = 亮紫强调 */
.ai > strong:first-child,
.ai > b:first-child { color: var(--purple); font-weight: 700; }
/* AI面板内行内加粗 = 白色高亮 */
.ai strong, .ai b { color: var(--tx); font-weight: 700; }
/* AI面板内的表格/数值不让smartColorize误染色（已由js skip保护，此处兜底）*/
.ai td span.up, .ai td span.dn { color: inherit; font-weight: inherit; }
.nt {
  background: rgba(245,158,11,.05);
  border: 1px solid rgba(245,158,11,.12);
  border-left: 4px solid var(--amber);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 12.5px;
  color: #e8cf8a;
  line-height: 1.75;
}
.al {
  background: rgba(239,68,68,.05);
  border: 1px solid rgba(239,68,68,.12);
  border-left: 4px solid var(--red);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 12.5px;
  color: #fca5a5;
  line-height: 1.75;
}

/* Divider */
.dv {
  display: flex; align-items: center; gap: 14px;
  margin: 28px 0 14px;
  font-size: 13px; font-weight: 700;
  color: var(--gold);
}
.dv::before, .dv::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--line-hover), transparent); }

/* ═══ RESEARCH MODULES（研报模块 — 参考截图的section header风格）═══ */
.mod {
  margin-bottom: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.mod-hd {
  background: linear-gradient(135deg, #131b29, #182036);
  color: var(--tx);
  padding: 14px 22px;
  font-size: 15.5px;
  font-weight: 600;
  border-bottom: 1px solid var(--line);
  letter-spacing: .2px;
}
.mod-bd { padding: 22px 24px; background: var(--card); }
.sec { margin-bottom: 22px; }
.sec:last-child { margin-bottom: 0; }
.sec-ttl {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 14px;
  padding-left: 14px;
  border-left: 3px solid var(--gold);
}

/* Dashboard grid cards */
.dg { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.dc {
  background: #0c1018;
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  border: 1px solid var(--line);
}
.dc .v { font-size: 26px; font-weight: 800; /* 颜色由渲染器设置，smartColorize v4不再强制金色 */ }
.dc .l { font-size: 11.5px; color: var(--tx2); margin-top: 5px; }
.dc .s { font-size: 10px; color: var(--tx3); margin-top: 2px; }

/* Signal dots & tags */
.sg { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.sr { background: #ef4444; } .sy { background: #eab308; } .sg2 { background: #22c55e; }
.tg { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
.tg-r { background: rgba(239,68,68,.12); color: #f87171; }
.tg-g { background: rgba(34,197,94,.12); color: #4ade80; }
.tg-y { background: rgba(234,179,8,.15); color: #fbbf24; }

/* Checklist items */
.cl { display: flex; gap: 12px; padding: 9px 0; font-size: 13px; }
.cl:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.cl-d {
  background: rgba(129,140,248,.12);
  color: #a5b4fc;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 6px;
  white-space: nowrap;
  min-width: 74px;
  text-align: center;
  font-size: 11px;
}
.cl-b { flex: 1; color: var(--tx-body); }

/* ═══ DEEP DIVE / FREE ANALYSIS MODULES ═══ */
.dual { display: flex; gap: 12px; margin: 14px 0; }
.bl {
  flex: 1;
  background: rgba(34,197,94,.04);
  border: 1px solid rgba(34,197,94,.12);
  border-left: 4px solid var(--green-accent);
  border-radius: 10px;
  padding: 16px 18px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--tx-body);
}
.br2 {
  flex: 1;
  background: rgba(239,68,68,.04);
  border: 1px solid rgba(239,68,68,.12);
  border-left: 4px solid var(--red);
  border-radius: 10px;
  padding: 16px 18px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--tx-body);
}
.bl .lbl { color: #4ade80; font-weight: 700; font-size: 12px; margin-bottom: 8px; }
.br2 .lbl { color: #f87171; font-weight: 700; font-size: 12px; margin-bottom: 8px; }
/* 双栏内文保持纯文本，禁止内嵌数值着色 */
.bl td, .br2 td { color: var(--tx-body); }
.bl span.up, .bl span.dn, .br2 span.up, .br2 span.dn { color: inherit!important; font-weight: inherit!important; }

.hlr {
  background: rgba(239,68,68,.05);
  border: 1px solid rgba(239,68,68,.2);
  border-left: 4px solid var(--red);
  border-radius: 12px;
  padding: 18px 20px;
  margin: 14px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--tx-body);
}
.hlr b { color: #f87171; }

.hlg {
  background: rgba(34,197,94,.05);
  border: 1px solid rgba(34,197,94,.2);
  border-left: 4px solid var(--green);
  border-radius: 12px;
  padding: 18px 20px;
  margin: 14px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--tx-body);
}

/* Operation plan cards */
.op-big { display: flex; gap: 12px; margin: 14px 0; }
.op-d {
  flex: 1;
  background: var(--card);
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  border: 1px solid var(--line);
  transition: all .2s;
}
.op-d:hover { border-color: var(--line-hover); }
.op-d.hl { background: rgba(239,68,68,.05); border-color: rgba(239,68,68,.2); }
.op-d .d { font-size: 26px; font-weight: 800; color: var(--blue); }
.op-d.hl .d { color: var(--red); }
.op-d .act { font-size: 13px; font-weight: 600; margin: 8px 0; color: var(--tx); }
.op-d .amt { font-size: 17px; font-weight: 800; color: var(--gold); }
.op-d .det { font-size: 11px; color: var(--tx3); margin-top: 8px; white-space: pre-line; line-height: 1.5; }

.ver {
  background: var(--card-in);
  border: 1px solid rgba(91,143,222,.2);
  border-left: 4px solid var(--blue);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 14px 0;
  font-size: 13px;
  line-height: 1.9;
  color: var(--tx-body);
}
.ver h3 { color: #93b5f7; font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.rref { color: var(--purple); font-size: 11.5px; border-left: 3px solid var(--purple); padding-left: 12px; margin: 10px 0; line-height: 1.7; }

/* Timeline-style info list */
.tl { display: flex; gap: 0; margin: 14px 0; }
.tl-i {
  flex: 1;
  background: #0c1018;
  padding: 11px 8px;
  text-align: center;
  border-right: 2px solid var(--card);
  font-size: 11px;
  border-radius: 8px 0 0 8px;
}
.tl-i.lst { border-right: none; border-radius: 0 8px 8px 0; }
.tl-i .d { font-weight: 700; color: var(--blue); }
.tl-i .a { color: var(--tx2); margin-top: 4px; }

/* ═══ V7 EXTENDED MODULES — 深度挖掘+自由分析新增模块 ═══ */

/* Module 10: History Track */

.ht-card h4 { color: var(--gold); font-size: 13.5px; margin-bottom: 10px; font-weight: 600; }

/* Module 11: Sensitivity Analysis */

.sum-card h4 { color: var(--gold); font-size: 14.5px; margin-bottom: 14px; font-weight: 600; }
.sum-card .k3 { font-size: 13px; color: var(--tx-body); padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.sum-card .k3:last-child { border-bottom: none; }
.sum-card .k3 b { color: var(--gold); font-weight: 600; }

/* Policy card (free-analysis dim 8) */
.pol-card {
  background: rgba(245,158,11,.04);
  border: 1px solid rgba(245,158,11,.15);
  border-left: 4px solid var(--amber);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.pol-card h4 { color: #fbbf24; font-size: 13.5px; margin-bottom: 8px; font-weight: 600; }

/* Profit chain card (free-analysis dim 9) */
.prf-card {
  background: rgba(52,217,153,.03);
  border: 1px solid rgba(52,217,153,.12);
  border-left: 4px solid var(--green-accent);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.prf-card .wr { padding: 7px 0; color: #4ade80; font-weight: 600; border-bottom: 1px solid rgba(52,217,153,.08); }

/* Scenario card (free-analysis dim 10) */
.scn-card {
  background: var(--blue-dim);
  border: 1px solid rgba(91,143,222,.12);
  border-left: 4px solid var(--blue);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.scn-card h4 { color: #93b5f7; font-size: 13.5px; margin-bottom: 8px; font-weight: 600; }
.scn-card .ev { color: var(--tx-body); font-size: 13px; font-weight: 600; }
.scn-card .up { color: #4ade80; }
.scn-card .un { color: #fbbf24; }

/* Counterfactual card (free-analysis dim 11) */
.cf-card {
  background: rgba(239,68,68,.03);
  border: 1px solid rgba(239,68,68,.12);
  border-left: 4px solid var(--red);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.cf-card h4 { color: #f87171; font-size: 13.5px; margin-bottom: 8px; font-weight: 600; }
.cf-card .if { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 12.5px; color: var(--tx2); }
.cf-card .if b { color: var(--tx); }

/* ═══ CONTENT TEXT — 保持默认色，不强制着色 ═══ */
/* 不再给所有 strong/b 加金色！只有 smartColorize 标记的 span 才着色 */
.card strong, .card b,
.mod-bd strong, .mod-bd b { color: var(--tx); font-weight: 600; }
.bl strong, .bl b { color: #34d399; font-weight: 700; }
.br2 strong, .br2 b { color: #f87171; font-weight: 700; }
.ver strong, .ver b { color: #93b5f7; font-weight: 700; }

/* 涨跌百分比（smartColorize v3 生成的 span）— 红涨绿跌 */
.up { color: var(--red); font-weight: 700; }
.dn { color: var(--green); font-weight: 700; }

/* 关键数值保持金色：仅限汇总栏 + 仪表盘卡片 */
.sb .val { color: var(--gold); }
.sc .n { text-shadow: 0 0 20px rgba(212,168,83,.15); }

/* Footer */
/* ═══ UNIFIED FOOTER — 数据源 + 触发规则 ═══ */

/* Research keyword tags */
.kw { margin-top: 12px; }
.kw strong { font-size: 12px; color: var(--tx2); margin-right: 8px; }
.kw code {
  background: rgba(212,168,83,.08);
  border: 1px solid rgba(212,168,83,.15);
  padding: 3px 9px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  margin-right: 4px;
}
.uf {
  margin-top: 28px;
  padding: 18px 22px;
  background: linear-gradient(135deg, #0c1018, #111827);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
}
.uf-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.uf-src {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.uf-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 10.5px;
  font-weight: 700;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid rgba(212,168,83,.18);
  white-space: nowrap;
}
.uf-info {
  font-size: 10.5px;
  color: var(--tx3);
  line-height: 1.5;
}
.uf-rules {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: rgba(255,255,255,.02);
  border-radius: 8px;
  margin-bottom: 8px;
}
.uf-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
}
.uf-rules code {
  background: var(--card-hi);
  border: 1px solid rgba(255,255,255,.08);
  padding: 3px 9px;
  border-radius: 4px;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 9.5px;
  color: var(--cyan);
  white-space: nowrap;
}

/* Mobile footer */
@media (max-width: 768px) {
  .uf { padding: 12px 14px; margin-top: 18px; }
  .uf-badge { font-size: 9px; padding: 2px 8px; }
  .uf-info { font-size: 9px; }
  .uf-rules { gap: 4px; padding: 8px 10px; }
  .uf-title { font-size: 10px; }
  .uf-rules code { font-size: 8px; padding: 2px 6px; }
  .ft { font-size: 10px; margin-top: 8px; }
}

.ft { text-align: center; font-size: 11px; color: var(--tx3); margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); }
.empty { text-align: center; padding: 120px 20px; color: var(--tx3); }
.empty h3 { font-size: 20px; margin-bottom: 10px; color: var(--tx2); }

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
#pc > * { animation: fadeIn .3s ease; }

/* ═══ SCROLLBAR（暗色主题自定义滚动条）═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

/* Selection color */
::selection { background: rgba(212,168,83,.25); color: var(--tx); }

/* ══════════════════════════════════════════════════════════════
   MOBILE RESPONSIVE — iPhone 17 Pro Max & all smartphones
   ══════════════════════════════════════════════════════════════ */

/* ── Base: phones (< 768px) ── */
@media (max-width: 768px) {
  body { font-size: 13px; }
  .wrap { padding: 10px 12px 36px; }

  /* ── Banner ── */
  .banner {
    padding: 18px 14px 16px;
    border-radius: 0 0 12px 12px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .brand { font-size: 24px; letter-spacing: 3px; }
  .brand-sub { font-size: 9.5px; letter-spacing: 1px; padding-left: 2px; }
  .bs-icon { font-size: 6px; }
  .bs-sep { margin: 0 3px; }
  .bs-status { font-size: 9px; }

  /* Hide kw-hint on tiny screens to save space */

  /* ── Topbar ── */
  .topbar { flex-wrap: wrap; gap: 10px; margin: 16px 0 12px; }
  .tn { width: 100%; justify-content: center; gap: 2px; padding: 2px; overflow-x: auto; flex-wrap: nowrap; }
  .tn a { padding: 11px 14px; font-size: 12px; min-width: 60px; text-align: center; }
  .tb-right { width: 100%; justify-content: center; gap: 8px; order: -1; }
  .tb-time { font-size: 11px; padding: 5px 10px; }

  /* ── Market tabs ── */
  .mt { grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 14px; }
  .mt-item { padding: 10px 6px 9px; }
  .mt-item .s { font-size: 22px; }
  .mt-item .l { font-size: 10px; }

  /* ── Cards ── */
  .card { padding: 16px 16px; margin-bottom: 12px; border-radius: var(--r-md); overflow-x: auto; }

<td>CXMT IPO + WAIC + 中报季</td><td>🟢 7-8月催化密度极高</td></tr>\n</table>\n\n<div class=\"hl\">\n<strong>AI裁决：A股AI板块不会崩盘，但也不会直接冲击新高。</strong>7/9暴涨（科创50 +6.67%）→ 7/10暴跌（-5.53%）的极端波动，是\"利好兑现即利空\"的典型走法。CXMT IPO（7/16申购 + ~7/23上市）和 WAIC（7/17-20）两大催化将给7月下旬带来一波反弹行情，但<strong>反弹的持续性和高度取决于中报业绩能否超预期</strong>。当前最可能的路径：7月震荡寻底 → 中报潮（8月）决定方向 → Q4冲刺新高。</div>\n\n<h2>二、07709 SK海力士2x：回本了，该走该留？</h2>\n\n<table>\n<tr><th>指标</th><th>当前值</th><th>备注</th></tr>\n<tr><td>持仓成本</td><td>118.8 HKD × 4,300股</td><td>总投资约51.1万HKD</td></tr>\n<tr><td>当前价格（7/10附近）</td><td>~108-110 HKD</td><td>距成本约<span class=\"dn\">-8%~-9%</span></td></tr>\n<tr><td>剩余可用资金</td><td>23万HKD</td><td>可补仓~2,000股</td></tr>\n<tr><td>SK海力士ADR</td><td>280亿美元IPO，7倍超额认购，7/10挂牌</td><td>全球第二大IPO（仅次于SpaceX）</td></tr>\n<tr><td>海力士正股</td><td>237.2万韩元（约1380美元）</td><td>年初至今涨幅巨大，近期回调</td></tr>\n<tr><td>07709年初至今</td><td>+494%</td><td>杠杆产品，波动极大</td></tr>\n<tr><td>韩亚证券目标价</td><td>160万韩元（对海力士正股）</td><td>意味着正股还有空间</td></tr>\n</table>\n\n<h3>两面叙事</h3>\n\n<p><strong>Bull Case（补仓）：</strong>SK海力士ADR获得7倍超额认购——这是<strong>机构对海力士估值的高度认可</strong>。ADR挂牌后簿记卖压解除，正股回归基本面。HBM订单排至2027年，英伟达Rubin全面量产（7/2026）将推升HBM需求至新高度。韩亚证券目标价160万韩元（当前237.2万已经远超目标，但市场情绪可能继续推高）。07709在80-90区间补仓至6,300股，成本降至约100HKD。若正股涨至350-400万韩元，07709可能冲击150-200HKD，实现翻倍。</p>\n\n<p><strong>Bear Case（清仓/观望）：</strong>07709是<strong>2倍杠杆产品</strong>，不是正股。每日波动10-20%是常态。ADR挂牌日可能出现剧烈的\"买预期卖事实\"抛售（7/10韩国正股已跌2.19%）。海力士正股237.2万韩元对应PE已经极高（市场一致预期被上调多次但仍可能过于乐观）。杠杆ETF有<strong>损耗效应</strong>（波动越大，损耗越快），不适合长期持有。更重要的是<strong>腾讯200万HKD未解禁RSU</strong>（8月解禁50万），这已经是你在港股的最大暴露，再加07709会严重集中风险。</p>\n\n<div class=\"warn\">\n<strong>AI裁决：不补仓，等回本后减仓至2,000-3,000股。</strong>理由：①ADR簿记刚结束，短期卖压虽解除但\"买预期卖事实\"规律可能重演；②你的港股总暴露（腾讯200万+07709 51万）已经过于集中；③2倍杠杆产品不适合\"搏翻倍\"策略——如果真有信心海力士涨到400万韩元，应该买正股（可通过富途买韩国正股或等ADR），而不是拿2倍杠杆产品做长期持仓。建议下周07709若反弹至115-118成本线，先减2,000股锁利；剩余2,300股作为HBM长期头寸保留。</div>\n\n<h2>三、国瓷材料 300285：能否从74拿到150？</h2>\n\n<table>\n<tr><th>指标</th><th>当前值</th><th>分析</th></tr>\n<tr><td>持仓成本</td><td>87.70元 × 3,000股</td><td>浮亏约15.5%（~4万）</td></tr>\n<tr><td>当前价（7/10）</td><td>74.10元</td><td>距成本-15.5%</td></tr>\n<tr><td>摩根大通目标价</td><td><strong>136元</strong>（7/2上调，之前60.40→136，+125%）</td><td>市场最高目标价</td></tr>\n<tr><td>机构综合目标价</td><td>46.68元（失真·前期陈旧低目标拖累）</td><td>远低于实际市价，参考价值有限</td></tr>\n<tr><td>PE(TTM)</td><td>129.83x</td><td>极高，但大摩认为2027/2028 EPS将大幅改善</td></tr>\n<tr><td>高端MLCC粉体产能</td><td>2000吨已投产 + 3000吨2026年底</td><td>AI服务器MLCC用量是传统15倍</td></tr>\n</table>\n\n<h3>核心逻辑</h3>\n<p>大摩给出136元的核心叙事：AI服务器MLCC用量是传统服务器的<strong>15倍</strong>，高端钛酸钡粉体（50-100nm）从几乎零到2027年占收入35%+。这意味收入结构质变——从卖\"大路货\"变成卖\"AI特供\"，毛利率从37%→50%。如果这个叙事成立，74元就是<strong>绝对低估</strong>（比目标价低45%）。</p>\n\n<div class=\"hl\">\n<strong>AI裁决：国瓷是最适合\"打满\"的A股标的，目标150元需要时间但逻辑成立。</strong>当前74元处于CXMT申购周情绪杀跌的底部区间。建议：①70-72元加仓1,000-1,500股（成本降至82-84元）；②若继续跌至65-68元再加仓1,500-2,000股（目标持股5,000-6,000股，成本降至78-80元）。150元目标价对应市值约1500亿，在大摩逻辑下并非疯狂——关键是高端产品能否在2027年放量。持有周期建议12-18个月。</div>\n\n<h2>四、兆易创新 603986：能破1000吗？</h2>\n\n<table>\n<tr><th>指标</th><th>当前值</th><th>分析</th></tr>\n<tr><td>持仓成本</td><td>681.20元 × 500股</td><td>浮亏约10.2%（~3.5万）</td></tr>\n<tr><td>当前价（7/10）</td><td>612.00元</td><td>从高点663已回调</td></tr>\n<tr><td>半年报业绩</td><td>上半年净利润约69亿（远超全年预测均值46亿）</td><td>业绩爆炸式增长</td></tr>\n<tr><td>全年预测</td><td>80-100亿（同比+385-507%）</td><td>最乐观看100亿</td></tr>\n<tr><td>前瞻PE</td><td>~68x（基于全年100亿）</td><td>PEG <0.5（若增长500%）</td></tr>\n<tr><td>大摩目标价</td><td><strong>888元</strong>（乐观1543元）</td><td>A股存储龙头溢价</td></tr>\n<tr><td>里昂目标价</td><td>399.5元（H股538港元）</td><td>较当前折价35%，最保守</td></tr>\n<tr><td>一致预期目标价</td><td>444.75元（新财富统计）</td><td>明显低于大摩，拆分布清楚</td></tr>\n</table>\n\n<h3>核心矛盾</h3>\n<p>大摩目标价888元 vs 市场一致预期444元——差距近乎翻倍。这意味着<strong>市场分歧极大</strong>。看多者（大摩/高盛）押注的是\"存储涨价周期延续+长鑫平台DRAM扩容+定制化存储第二曲线\"；看空者认为当前612元已经把全年100亿净利润充分定价（前瞻PE 68x），未来增速难以维持500%。</p>\n\n<div class=\"warn\">\n<strong>AI裁决：兆易不适合\"搏1000\"，更适合波段操作。</strong>相比国瓷的明确产业趋势（MLCC材料国产替代不可逆），兆易的1000元目标价需要DRAM价格维持高位+长鑫上市带来估值重估+MCU业务放量三重逻辑同时成立。任何一个落空都可能导致估值下修。建议：①维持现有500股仓位（不要焦虑浮亏）；②600以下（如550-580）加仓100-200股跌破成本；③若反弹至680-700元减仓200股（降至300股核心仓）。<strong>不要在612元重仓追高</strong>。</div>\n\n<h2>五、支付宝基金：005698 vs 100055 vs QDII配置</h2>\n\n<table>\n<tr><th>基金</th><th>代码</th><th>类型</th><th>当前策略</th><th>建议</th></tr>\n<tr><td>富兰克林科技</td><td>100055</td><td>全球科技QDII</td><td>DCA·36万/年计划</td><td><strong>保留·继续DCA</strong> —— 全球科技分散化，与A股持仓互补</td></tr>\n<tr><td>华夏全球科技</td><td>005698</td><td>全球科技QDII</td><td>DCA·同36万计划</td><td><strong>保留但不新增DCA</strong> —— 与100055重叠度高，两只保留成本</td></tr>\n<tr><td>天弘通信设备</td><td>020900</td><td>光模块/通信</td><td>1.7万小仓·未开定投</td><td><strong>暂时不加仓</strong> —— 已卖出新易盛，光模块板块高波动不适合小资金长持</td></tr>\n</table>\n\n<div class=\"info\">\n<strong>AI裁决：①两只QDII都保留但不要两只都DCA。</strong> 005698和100055持仓高度重叠（都是全球科技），DCA一只即可（选100055——申购费率更低+规模更大）。②020900光模块基金：1.7万小仓不值得再加大投入。光模块板块你已获利了结新易盛(+2814)，不需要再通过基金暴露。如果有闲散资金，优先投向国瓷材料而非光模块基金。③深科技等PCB标的：不建议买入。PCB是AI产业链中游，投资逻辑不如上游材料（国瓷）和设备（北华）清晰，估值弹性也更小。你应该聚焦\"最锋利的刀\"——国瓷+北华。</div>\n\n<h2>六、长鑫科技 688825：打新还是直接买？</h2>\n\n<table>\n<tr><th>维度</th><th>宁德时代（2018）</th><th>长鑫存储（2026）</th></tr>\n<tr><td>首发价/募资</td><td>25.14元·54亿</td><td>预估~4.4元·295亿</td></tr>\n<tr><td>连板数</td><td>8连板后开板</td><td>科创板无连板限制（首日不限涨跌幅）</td></tr>\n<tr><td>首年涨幅</td><td>从25元涨至~70元（约3x）</td><td>未知</td></tr>\n<tr><td>港股上市后涨幅</td><td>280元→800元（约3x）</td><td>不适用（仅科创板）</td></tr>\n<tr><td>行业对标</td><td>动力电池全球第一</td><td>DRAM国产替代唯一标的</td></tr>\n<tr><td>当时大盘</td><td>上证3050·贸易战</td><td>上证3996·AI上行周期</td></tr>\n<tr><td>流通市值</td><td>约54亿</td><td>约295亿（战略配售锁定50%后实际流通~147亿）</td></tr>\n</table>\n\n<h3>打新还是二级买入？</h3>\n\n<p><strong>打新</strong>：网上发行6.69亿股，预估中签率0.05-0.1%（科创板大盘股中签率通常较高）。以4.4元预估发行价计算，中一签（500股）需要2,200元。如果市场热情高，首日涨幅可能30-50%（1,320-2,200元收益），但也可能10-20%。</p>\n\n<p><strong>二级买入</strong>：4元附近买入搏3倍至12元——这个逻辑的核心问题是<strong>长鑫流通市值（~295亿）已经是A股大票</strong>。宁德时代能以280元三年涨3倍，是因为它从500亿市值涨到1.5万亿（盈利翻了3倍）。长鑫从~2,000亿市值（发行估值）涨至6,000亿？需要DRAM价格持续大涨+产能释放+市场给予极高估值。不是不可能，但比宁德时代当年难得多——因为基数不同。</p>\n\n<div class=\"warn\">\n<strong>AI裁决：打新必须参与，二级市场不追高。</strong>①7/16申购日全力打新（科创板权限开通后），这是低风险套利。②上市首日（~7/23-25）若涨幅<30%且价格在5.5元以下，可以买入1-2万元试探性仓位（不超过可用现金的1-2%）。③不要在上市首日追涨（科创板首日不限涨跌幅，动辄50-100%涨幅后往往是暴跌）。④长期来看，长鑫存储确实是\"中国DRAM唯一标的\"，但你需要等一个更好的入场时机——也许在上市3-6个月后估值回归合理区间。</div>\n\n<h2>七、综合操作计划</h2>\n\n<table>\n<tr><th>标的</th><th>当前仓位</th><th>操作方向</th><th>具体计划</th><th>目标仓位</th></tr>\n<tr><td>300285 国瓷材料</td><td>3,000股·26.3万</td><td><strong>逢低加仓</strong></td><td>70-72元 +1000股 · 65-68元 +1500股</td><td>5,000-5,500股·约40-42万</td></tr>\n<tr><td>603986 兆易创新</td><td>500股·34.1万</td><td><strong>持有+波段</strong></td><td>550-580元 +100-200股 · 680-700元 减200股</td><td>300-600股浮动</td></tr>\n<tr><td>07709 海力士2x</td><td>4,300股·51.1万HKD</td><td><strong>回本减仓</strong></td><td>115-118元 减2,000股 · 保留2,300股核心仓</td><td>2,300股·约23万HKD</td></tr>\n<tr><td>002371 北方华创</td><td>未建仓</td><td><strong>等780以下</strong></td><td>750元 买100股 · 700元 买100-200股</td><td>100-300股</td></tr>\n<tr><td>100055 QDII</td><td>DCA中</td><td><strong>继续·唯一QDII</strong></td><td>维持每月3万定投·005698停投保留</td><td>不变</td></tr>\n<tr><td>688825 长鑫</td><td>无</td><td><strong>打新+观望</strong></td><td>7/16全力申购·上市首日涨幅<30%可轻仓试探</td><td>0-2万试探</td></tr>\n</table>\n\n<div class=\"hl\">\n<strong>核心策略一句话：国瓷是主攻方向（加仓打满），兆易波段防守，07709等回本减仓，北华等跌入场，长鑫只打新不追二级。</strong>你的120万增量资金，建议40-50万配置国瓷（加仓后合计66-76万），20万留给北华，10万QDII定投，其余保留现金应对CXMT上市后的波动。理想预期不是一周翻倍——而是通过12-18个月的持有，在MLCC涨价周期+AI设备国产替代的确定性趋势中实现80%的仓位增值。</div>\n\n<p style=\"text-align:right; color:var(--tx3); margin-top:24px\">⚡ 以上为AI独立研判，不构成投资建议 · 数据截至2026-07-10至07-12</p>\n"

  "content": "<style>\n.fa-free-content { font-size: 14px; line-height: 1.85; color: var(--tx-body); }\n.fa-free-content h2 { font-size: 1.2em; margin: 28px 0 12px; color: var(--tx-title); border-left: 3px solid var(--gold); padding-left: 12px; }\n.fa-free-content h3 { font-size: 1.05em; margin: 20px 0 8px; color: var(--tx); }\n.fa-free-content p { margin: 8px 0; }\n.fa-free-content strong { color: var(--tx); font-weight: 600; }\n.fa-free-content table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 12px; }\n.fa-free-content th { background: #0c1018; padding: 8px 12px; text-align: left; font-size: 11px; color: var(--tx2); border-bottom: 1px solid var(--line); white-space: nowrap; }\n.fa-free-content td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.03); color: var(--tx-body); }\n.fa-free-content .up { color: #e74c3c; font-weight: 600; }\n.fa-free-content .dn { color: #27ae60; font-weight: 600; }\n.fa-free-content .hl { background: rgba(255,200,0,.08); border-left: 3px solid var(--gold); padding: 12px 16px; margin: 14px 0; border-radius: 4px; }\n.fa-free-content .warn { background: rgba(231,76,60,.08); border-left: 3px solid var(--red); padding: 12px 16px; margin: 14px 0; border-radius: 4px; }\n.fa-free-content .info { background: rgba(59,130,246,.08); border-left: 3px solid #3b82f6; padding: 12px 16px; margin: 14px 0; border-radius: 4px; }\n</style>\n\n<h2>一、长鑫存储 IPO：时间线与关键数字</h2>\n\n<p>长鑫科技（688825）将于<strong>2026年7月16日（周三）</strong>正式开启网上/网下申购，代码787825。这将是2026年A股<strong>最大规模IPO</strong>，拟募集295亿元，超越华润新能源的245亿。以下为关键时间节点：</p>\n\n<table>\n<tr><th>日期</th><th>事件</th><th>影响评估</th></tr>\n<tr><td>7月9日（周三）</td><td>招股意向书发布，市场首日反应</td><td>科创50暴涨+6.67%，80+芯片股涨停</td></tr>\n<tr><td>7月10日（周四）</td><td>消息兑现后获利回吐</td><td>科创50暴跌-5.53%，兆易-7.76%，北华-8.81%，国瓷-8.29%</td></tr>\n<tr><td><strong>7月13日（周日）</strong></td><td>初步询价（T-3）</td><td>机构定价值预期，定价区间<strong>影响周五尾盘走势</strong></td></tr>\n<tr><td><strong>7月15日（周二）</strong></td><td>发行公告·定价确定（T-1）</td><td>定价高低直接决定<strong>市场情绪和二级标的走势</strong></td></tr>\n<tr><td><strong>7月16日（周三）</strong></td><td>网上/网下申购日（T）</td><td>冻结资金峰值日，短期流动性冲击最明显</td></tr>\n<tr><td>7月17日（周四）</td><td>申购后首日（T+1）</td><td>历史上大型IPO后次日大概率震荡偏弱</td></tr>\n<tr><td><strong>7月20日（周日）</strong></td><td>缴款截止</td><td>资金解冻回流日，下周行情窗口</td></tr>\n<tr><td>约7月23-25日</td><td>预计上市挂牌</td><td><strong>最大不确定事件：开板日吸金效应</strong></td></tr>\n</table>\n\n<p>关键数据：本次发行66.88亿股（+15%绿鞋），战略配售50%（33.44亿股），网下发行26.75亿股，<strong>网上发行6.69亿股</strong>。董事长朱一明承诺<strong>十年锁定期</strong>，这在A股极为罕见，体现管理层信心。</p>\n\n<h2>二、历史对标：宁德时代 vs 长鑫存储</h2>\n\n<p>宁德时代2018年6月11日上市，是近年最具可比性的大型科技IPO。以下为对比分析：</p>\n\n<table>\n<tr><th>维度</th><th>宁德时代（2018.6）</th><th>长鑫存储（2026.7）</th><th>差异含义</th></tr>\n<tr><td>募资规模</td><td>54亿（后缩减至50-60亿区间）</td><td><strong>295亿（5.5倍）</strong></td><td>CXMT体量更大，但当前A股日均成交3万亿+，<strong>相对冲击可能更小</strong></td></tr>\n<tr><td>新股占流通比</td><td>~2.7%</td><td>~10%（绿鞋后11.3%）</td><td>CXMT流通盘占比相对更高</td></tr>\n<tr><td>当日A股成交额</td><td>~3,500亿</td><td>33,900亿（7/10）</td><td>当前市场深度是2018年的<strong>9.7倍</strong></td></tr>\n<tr><td>IPO募资/A股日成交</td><td>1.5%</td><td><strong>0.87%</strong></td><td>实际资金冲击比例<strong>远低于宁德时代</strong></td></tr>\n<tr><td>连续涨停数</td><td>8个涨停</td><td>TBD（市场预期3-5个）</td><td>科创板首日无涨停板限制，<strong>波动更大</strong></td></tr>\n<tr><td>开板日成交金额</td><td>86亿（占A股2.1%）</td><td>预计300-500亿（占0.9-1.5%）</td><td>绝对金额更大但<strong>占比更低</strong></td></tr>\n<tr><td>上市前大盘走势</td><td>上证从3100跌至3050（-1.6%）</td><td>上证从4000跌至3996（-0.1%）</td><td>当前大市<strong>韧性明显更好</strong></td></tr>\n<tr><td>同期外围环境</td><td>中美贸易战第一年+资管新规去杠杆</td><td>AI产业上行周期+国产替代政策加码</td><td>当前<strong>产业顺风</strong></td></tr>\n</table>\n\n<div class=\"hl\">\n<strong>核心结论：</strong>CXMT募资规模是宁德时代的5.5倍，但A股日均成交额增长9.7倍——<strong>吸血效应的量化基础不成立</strong>。真正的风险不是资金层面的，而是<strong>情绪层面的\"锚定效应\"</strong>：投资者看到295亿募资金额会恐慌，但忽略了当前市场早已不是2018年。</div>\n\n<h2>三、资金面：吸血效应的量化分析</h2>\n\n<p>2018年的\"独角兽\"集体上市确实造成了显著的短期流动性冲击。根据新时代证券研究数据，工业富联开板日成交158亿（占A股4.6%），宁德时代开板日成交86亿（占A股2.1%）。但彼时A股日均成交仅3,500-4,000亿。当前A股日均成交3万亿以上，市场深度不可同日而语。</p>\n\n<table>\n<tr><th>资金影响层面</th><th>量化估算</th><th>对大盘影响</th></tr>\n<tr><td>网上申购冻结资金</td><td>6.69亿股 × 预估定价4.4元 = 约29.4亿（网上）</td><td>几乎可忽略（占A股日成交<0.1%）</td></tr>\n<tr><td>网下配售冻结</td><td>26.75亿股 × 4.4元 ≈ 117.7亿</td><td>中等（但以机构长期配置资金为主）</td></tr>\n<tr><td>战略配售</td><td>33.44亿股 × 4.4元 ≈ 147.1亿（50%提前锁定）</td><td><strong>对二级市场无直接抽血</strong></td></tr>\n<tr><td>缴款日（T+2）实际抽血</td><td>约147亿（网上+网下）</td><td><strong>7月20日前后的最大实际资金流出</strong></td></tr>\n<tr><td>挂牌日预期冲击</td><td>开板日可能成交300-500亿</td><td>集中爆量，单日对科技板块有<strong>挤出效应</strong></td></tr>\n</table>\n\n<div class=\"warn\">\n<strong>真正要警惕的不是申购日（7/16），而是挂牌日。</strong>科创板新股无首日涨幅限制，首日可能出现换手率80%+、成交额300-500亿的巨量。这种爆量会短暂挤出同板块（半导体/存储）的交易流动性，类似2026年7月10日半导体板块的集中抛售。<strong>挂牌日前后2个交易日（约7月23-25日），需降低半导体仓位暴露。</strong>\n</div>\n\n<h2>四、北方华创深度评估：现在能不能买？</h2>\n\n<table>\n<tr><th>指标</th><th>当前值</th><th>历史分位</th><th>判断</th></tr>\n<tr><td>最新收盘价</td><td><strong>801.00元</strong>（7/10）</td><td>52周范围314-967</td><td>距高点-17%，但距低位+155%</td></tr>\n<tr><td>PE(TTM)</td><td><strong>104.42x</strong></td><td>5年76.18%分位</td><td>历史高位区间</td></tr>\n<tr><td>PB</td><td><strong>15.28x</strong></td><td>—</td><td>极高，但设备股PB天然高</td></tr>\n<tr><td>机构目标价</td><td><strong>607.78元</strong></td><td>—</td><td><strong>当前价高于机构均价+31.7%</strong></td></tr>\n<tr><td>机构最高目标价</td><td>818元</td><td>—</td><td>已跌破唯一看多的上限</td></tr>\n<tr><td>RSI(6)</td><td>极度超买→7/2回调</td><td>—</td><td>短期超买已修复但<strong>未到安全买点</strong></td></tr>\n<tr><td>毛利率</td><td>40.10%（下行）</td><td>—</td><td>新品验证拖累，<strong>利润率拐点未现</strong></td></tr>\n<tr><td>研发费用率</td><td>18.49%</td><td>—</td><td>极其激进，<strong>看长线者可接受</strong></td></tr>\n<tr><td>7/10主力净流入</td><td><strong>大单净流出</strong></td><td>—</td><td>7/9流入16.5亿，7/10大量回吐</td></tr>\n</table>\n\n<h3>北方华创的两面叙事</h3>\n\n<p><strong>Bull Case（为什么该买）：</strong>CXMT 295亿募资中有<strong>75亿用于晶圆制造量产线升级、130亿用于DRAM技术升级</strong>——合计205亿将直接转化为设备采购订单。北方华创（刻蚀/薄膜沉积/清洗/炉管）产品线最全，是CXMT扩产的第一受益方。国产设备替代率从2025年的约25%快速提升至2026年的约35%，长鑫扩产进一步加速这一趋势。</p>\n\n<p><strong>Bear Case（为什么不能买）：</strong>当前801元对应PE 104x，已远高于机构目标价607.78元（溢价31.7%）。CXMT扩产逻辑已被市场Price In（股价从6月初460元飙升到6/29的860元，+87%）。7月2日-10日的回调（从860→801，-6.9%）远未跌到位。CXMT申购落地后可能<strong>利好出尽</strong>，正如此前长江存储IPO消息推动设备股暴涨后同样出现大幅修正。更重要：CXMT的295亿募资中，设备采购并非一次性释放，<strong>分2-3年逐步投入</strong>，短期业绩贡献有限。</p>\n\n<div class=\"warn\">\n<strong>AI裁决：坚决不追高。</strong>801元距离你设定的780入场线尚有2.6%差距。在CXMT申购周（7/13-7/20），市场波动极大且方向不确定，<strong>不在780元以上买入</strong>。等待两个入场信号：①跌破780元；②7月15日定价公告后，若定价大幅低于预期可能引发设备股错杀，届时才是更优入场窗口。</div>\n\n<h2>五、持仓与标的全面评估</h2>\n\n<table>\n<tr><th>标的</th><th>成本/现价</th><th>浮盈/亏</th><th>CXMT周期评级</th><th>下周操作方向</th></tr>\n<tr><td>300285 国瓷材料</td><td>87.70 / <span class=\"dn\">74.10</span></td><td><span class=\"dn\">-15.5%</span>（约4.08万）</td><td>⭐⭐⭐⭐ 正向</td><td>MLCC涨价逻辑<strong>独立于存储</strong>，CXMT不影响国瓷。74元附近若继续下跌至70以下，<strong>加仓机会</strong></td></tr>\n<tr><td>603986 兆易创新</td><td>681.20 / <span class=\"dn\">612.00</span></td><td><span class=\"dn\">-10.2%</span>（约3.46万）</td><td>⭐⭐⭐ 中性偏正</td><td>NOR Flash与CXMT DRAM是<strong>不同产品线</strong>。CXMT上市带动存储板块关注度→对兆易有正溢出效应。但短期波动剧烈</td></tr>\n<tr><td>002371 北方华创</td><td>未建仓 / <span class=\"dn\">801.00</span></td><td>—</td><td>⭐⭐⭐⭐⭐ 最相关</td><td><strong>等780以下入场。</strong>本周大概率杀跌至800-750区间</td></tr>\n<tr><td>002409 雅克科技</td><td>计划中 / 未持有</td><td>—</td><td>⭐⭐⭐ 中性</td><td>SK海力士供应商，HBM前驱体，与CXMT无直接关系。维持≤190入场</td></tr>\n<tr><td>020900 天弘通信</td><td>定投中</td><td>—</td><td>⭐⭐ 弱正</td><td>光模块与存储交叉有限，不受CXMT直接影响。继续DCA</td></tr>\n<tr><td>688008 澜起科技</td><td>观望中</td><td>—</td><td>⭐⭐⭐⭐⭐ 最受益之一</td><td>DDR5内存接口芯片龙头，CXMT产能释放→对接口芯片需求增加。关注750-800区间</td></tr>\n</table>\n\n<h2>六、下周逐日操作节奏</h2>\n\n<table>\n<tr><th>日期</th><th>事件</th><th>操作建议</th><th>仓位方向</th></tr>\n<tr><td><strong>周一 7/13</strong></td><td>CXMT初步询价（T-3）</td><td>观望为主。询价结果可能盘后传出，<strong>尾盘可能出现预期博弈</strong></td><td>维持现有仓位不动</td></tr>\n<tr><td><strong>周二 7/14</strong></td><td>询价结果市场消化</td><td>若定价偏低→设备股可能承压（利好被压缩）。<strong>重点关注北华780以下机会</strong></td><td>准备现金，设780/750/720三档限价买入单</td></tr>\n<tr><td><strong>周三 7/15</strong></td><td>发行公告·定价确定（T-1）</td><td><strong>全周最重要的一天。</strong>定价高低决定板块方向。定价4.0元以下→利空设备；4.4元以上→利好</td><td>根据定价决定是否行动。北华若跌至750-760可轻仓试探</td></tr>\n<tr><td><strong>周四 7/16</strong></td><td>申购日（T）</td><td>冻结日，科技板块大概率缩量震荡。<strong>不操作。</strong></td><td>不买不卖。申购日追涨=被套</td></tr>\n<tr><td><strong>周五 7/17</strong></td><td>申购后首日</td><td>资金开始解冻回流，板块可能温和反弹。若北华在750-800区间<strong>继续观望不追</strong></td><td>观察资金回流方向，判断下周策略</td></tr>\n<tr><td><strong>周六-日 7/18-19</strong></td><td>周末</td><td>复盘CXMT申购情况+中签率+定价合理性，<strong>制定挂牌周策略</strong></td><td>冷静期</td></tr>\n</table>\n\n<h2>七、AI综合研判</h2>\n\n<div class=\"hl\">\n<strong>1. 长鑫IPO ≠ 系统性风险。</strong>295亿 vs A股日均3.4万亿成交 = 0.87%，量化\"吸血效应\"不成立。真正冲击来自<strong>挂牌日</strong>（约7月23-25日）的爆量交易。</div>\n\n<div class=\"hl\">\n<strong>2. 北方华创：1,000亿市值买到了未来3年的CXMT扩产预期。</strong>PE 104x已定价了所有已知利好。你的780入场线是合理的——但需准备<strong>跌破780后可能继续跌至720</strong>的心理预\n案。</div>\n\n<div class=\"info\">\n<strong>3. 国瓷材料是最安全的A股仓位。</strong>MLCC涨价独立于存储周期，CXMT对国瓷几无影响。74元位置若继续下跌至68-70元，是加仓至4,000-4,500股的好机会。当前浮亏-15%是<strong>短期波动而非逻辑破坏</strong>。</div>\n\n<div class=\"warn\">\n<strong>4. 兆易创新是CXMT周期的\"伪受益者\"。</strong>NOR Flash和DRAM是不同的产品线和市场，但市场情绪会把CXMT和兆易联系在一起（7/9兆易涨停10%，7/10暴跌-7.8%即情绪炒作）。若有反弹至650-680，<strong>可以考虑减仓200股降低持仓风险敞口</strong>。</div>\n\n<div class=\"info\">\n<strong>5. 最大被低估的风险：CXMT定价可能低于市场预期。</strong>如果询价区间定在3.5-4.0元而非市场上预期的4.0-4.5元，意味着<strong>管理层主动低定价吸引投资者</strong>，这对已在高位的设备股估值是利空——因为\"募资变少=设备采购预算可能缩减\"。</div>\n\n<h2>八、仓位管理建议</h2>\n\n<table>\n<tr><th>情景</th><th>国瓷</th><th>兆易</th><th>北华</th><th>现金</th></tr>\n<tr><td>当前</td><td>3,000股·26.3万</td><td>500股·34.1万</td><td>0</td><td><strong>60万</strong></td></tr>\n<tr><td>乐观（CXMT定价超预期+板块反弹）</td><td>维持</td><td>减至300股（-200股）</td><td>不入场</td><td>升至~72万</td></tr>\n<tr><td>基准（震荡·定价符合预期）</td><td>70以下加仓500-1,000股</td><td>维持</td><td>750以下买100股试探</td><td>降至~45万</td></tr>\n<tr><td>悲观（CXMT定价低于预期+继续杀跌）</td><td>68加仓1,000-1,500股</td><td>600以下加仓100股</td><td>720以下买200股</td><td>降至~20万</td></tr>\n</table>\n\n<div class=\"hl\">\n<strong>核心原则：</strong>下周不追高、不恐慌、不见兔子不撒鹰。CXMT IPO本身不是买入或卖出的理由——<strong>它只是加速已经存在的趋势</strong>（估值回归/资金轮动）。你的仓位已经通过分散配置（MLCC材料+NOR Flash+HBM杠杆+半导体ETF+光通信基金）构建了足够的缓冲垫（MLCC材料+NOR Flash+HBM杠杆+光通信基金）。接下来要做的不是换个方向，而是在已有方向上等待更好的价格。</div>\n\n<p style=\"text-align:right; color:var(--tx3); margin-top:24px\">⚡ 以上为AI独立研判，不构成投资建议 · 数据截至2026-07-10</p>\n"
};

<script>
// v5 daily — beautiful financial dashboard
function renderDaily(data, panel) {
  if (!data || !data.scores) { panel.innerHTML = '<div class="empty"><h3>暂无日报</h3><p>运行「生成日报」获取最新数据</p></div>'; return; }

  var h = '', sc = data.scores;

  // ═══ Macro ═══
  if (sc.macro) {
    var m = sc.macro;
    var bg = m.score < 60 ? 'var(--red)' : m.score < 75 ? 'var(--amber)' : '#22c55e';
    h += '<div class="card"><div class="sc-row">';
    h += '<div class="sc" style="background:'+bg+'"><span class="n">'+m.score+'</span><span class="l">'+(m.score<60?'谨慎':m.score<75?'中性':'积极')+'</span></div>';
    h += '<div class="sc-info"><div class="h">宏观综合判断</div><div class="d">'+(m.note||'')+'</div></div></div>';
    (data.macro_indicators||[]).forEach(function(x){
      var c = x.s < 40 ? 'var(--red)' : x.s < 60 ? 'var(--amber)' : '#22c55e';
      h += '<div class="brw"><span class="br-n">'+x.n+'</span><span class="br-av">'+(x.av||'--')+'</span><span class="br-t"><span class="br-f" style="width:'+x.s+'%;background:'+c+'"></span></span><span class="br-v">'+x.s+'</span><span class="br-d">'+x.d+'</span></div>';
    });
    if (data.macro_events) {
      h += '<div style="margin-top:10px">';
      data.macro_events.forEach(function(e){ h += '<div class="ev"><span class="et '+(e.cls||'em')+'">'+(e.tag||'')+'</span><span class="ev-t">'+e.title+'</span><div class="ev-b">'+e.body+'</div></div>'; });
      h += '</div>';
    }
    h += '</div>';
  }

  // ═══ Market Tabs ═══
  var mks = [
    {k:'us_stocks',l:'US 美股',c:'mt-us',e:'us'},
    {k:'hk_stocks',l:'HK 港股',c:'mt-hk',e:'hk'},
    {k:'korea',l:'KR 韩国',c:'mt-kr',e:'kr'},
    {k:'a_stocks',l:'CN A股',c:'mt-cn',e:'cn'}
  ];
  h += '<div class="mt">';
  mks.forEach(function(m){ h += '<div class="mt-item '+m.c+'" id="mt-'+m.k+'" onclick="showMkt(\''+m.k+'\')"><span class="s">'+(sc[m.k]?sc[m.k].score:'--')+'</span><span class="l">'+m.l+'</span></div>'; });
  h += '</div>';
  mks.forEach(function(m, i){
    var s = sc[m.k]; if (!s) return;
    var w = s.score<40?'偏弱':s.score<60?'中性':s.score<80?'偏强':'强势';
    h += '<div class="card" id="mp-'+m.k+'"'+(i>0?' style="display:none"':'')+'>';
    h += '<div class="sc-row"><div class="mc" style="background:'+(m.k==='us_stocks'?'linear-gradient(135deg,#3b82f6,#06b6d4)':m.k==='hk_stocks'?'linear-gradient(135deg,#f97316,#ef4444)':m.k==='korea'?'linear-gradient(135deg,#8b5cf6,#ec4899)':'linear-gradient(135deg,#6366f1,#3b82f6)')+'"><span class="n">'+s.score+'</span><span class="l">'+w+'</span></div>';
    h += '<div class="sc-info"><div class="h">'+s.note+'</div><div class="d">'+(s.desc||'')+'</div></div></div>';
    var mi = data.market_indicators && data.market_indicators[m.k];
    if (mi) { mi.forEach(function(r){ h += '<div class="mr"><span class="mr-n">'+r.name+'</span><span class="mr-av">'+(r.av||'--')+'</span><span class="mr-v">'+r.val+'</span><span class="mr-d">'+r.desc+'</span></div>'; }); }
    var me = data.market_events && data.market_events[m.k];
    if (me) { me.forEach(function(e){ h += '<div class="ev"><span class="et '+(e.cls||'')+'">'+(e.tag||'')+'</span><span class="ev-t">'+e.title+'</span><div class="ev-b">'+e.body+'</div></div>'; }); }
    h += '<div class="sb"><span class="lbl">综合评分</span><span class="val" style="color:'+(s.score<50?'var(--red)':s.score<70?'var(--amber)':'var(--green)')+'">'+s.score+'</span><span class="lbl">'+(s.summary||'')+'</span></div></div>';
  });

  // ═══ Holdings ═══
  if (data.holdings) {
    var st = [];
    if (data.holdings.a_stocks) st = st.concat(data.holdings.a_stocks.map(function(s){ s.mkt='RMB'; return s; }));
    if (data.holdings.hk_stocks) st = st.concat(data.holdings.hk_stocks.map(function(s){ s.mkt='HKD'; return s; }));
    if (data.holdings.funds) st = st.concat(data.holdings.funds.map(function(s){ s.mkt='RMB'; s.isF=true; return s; }));
    h += '<div class="card"><h2>持仓全景</h2><table><colgroup><col style="width:150px"/><col style="width:100px"/><col style="width:65px"/><col style="width:65px"/><col style="width:85px"/><col style="width:60px"/></colgroup><tr><th>标的</th><th>持仓</th><th>成本</th><th>现价</th><th>盈亏</th><th>渠道</th></tr>';
    st.forEach(function(s){
      var c = 'var(--green)'; // 默认绿色（亏损）
      // 处理 pnl_pct：可能是纯数字或含文本的混合格式
      var pctVal = s.pnl_pct;
      var pctDisplay = '';
      if (pctVal == null) { pctDisplay = '--'; }
      else if (typeof pctVal === 'number') {
        c = pctVal >= 0 ? 'var(--red)' : 'var(--green)';
        pctDisplay = (pctVal >= 0 ? '+' : '') + pctVal + '%';
      } else {
        // 字符串格式：含%的混合文本（如 "近1月约-5%"）
        // 正则必须匹配到%号，否则会错误匹配到文本中的其他数字（如"近1月"中的1）
        var numMatch = String(pctVal).match(/([+-]?\d+(?:\.\d+)?)%/);
        if (numMatch) {
          var n = parseFloat(numMatch[1]);
          c = (!isNaN(n) && n >= 0) ? 'var(--red)' : 'var(--green)';
        }
        pctDisplay = pctVal; // 原样显示，不追加%
      }
      var t = s.mkt==='HKD'?'<span class="thkd">HKD</span>':'<span class="trmb">RMB</span>';
      h += '<tr><td>'+t+' <strong>'+(s.code||'')+'</strong> '+(s.name||'')+'</td><td>'+s.shares+(s.isF?'':'股')+'</td><td>'+(s.cost||'--')+'</td><td>'+(s.current||'--')+'</td><td style="color:'+c+';font-weight:600">'+pctDisplay+'</td><td>'+(s.channel||'')+'</td></tr>';
    });
    h += '</table>';
    if (data.holdings_summary) h += '<div class="nt" style="margin-top:10px">'+data.holdings_summary+'</div>';
    h += '</div>';
  }

  // ═══ Triggers ═══
  if (data.triggers) {
    h += '<div class="card"><h2>触发矩阵</h2><table><colgroup><col/><col/><col/><col/><col/></colgroup><tr><th>标的</th><th>触发条件</th><th>现价</th><th>距离</th><th>操作</th></tr>';
    data.triggers.forEach(function(t){
      var cls = Math.abs(t.distance_pct)<5?'br':Math.abs(t.distance_pct)<10?'ba':'bb';
      h += '<tr><td><strong>'+(t.code||'')+'</strong> '+(t.name||'')+'</td><td>'+t.condition+'</td><td>'+t.current+'</td><td><span class="bad '+cls+'">'+t.distance_label+'</span></td><td>'+t.action+'</td></tr>';
    });
    h += '</table>';
    if (data.trigger_alert) h += '<div class="al" style="margin-top:10px">'+data.trigger_alert+'</div>';
    h += '</div>';
  }

  // ═══ AI Analysis ═══
  if (data.ai_analysis && data.ai_analysis.length) {
    h += '<div class="card"><h2>AI 独立研判</h2><div class="ai">';
    data.ai_analysis.forEach(function(x){
      var ct = x.confidence==='high'?'bg':x.confidence==='medium'?'ba':'br';
      h += '<div style="margin-bottom:14px"><strong>'+x.angle+'</strong> <span class="bad '+ct+'">'+x.confidence+'</span><br>'+x.judgment;
      if (x.action) h += '<br><strong>→ '+x.action+'</strong>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // ═══ Stock Analysis ═══
  if (data.stock_analysis) {
    var sa = data.stock_analysis;
    h += '<div class="dv"><span>可配置标的</span></div>';
    if (sa.core) {
      h += '<div class="card"><h2>核心配置</h2><table><colgroup><col style="width:22%"/><col style="width:14%"/><col style="width:18%"/><col style="width:16%"/><col/></colgroup><tr><th>标的</th><th>现价</th><th>持仓</th><th>触发</th><th>逻辑</th></tr>';
      sa.core.forEach(function(c){ h += '<tr><td><strong>'+c.code+'</strong> '+c.name+'</td><td>'+c.price+'</td><td>'+c.position+'</td><td>'+c.trigger+'</td><td>'+c.logic+'</td></tr>'; });
      h += '</table></div>';
    }
    if (sa.monitor_layers) {
      h += '<div class="card"><h2>持续监控 · 产业链分层</h2>';
      sa.monitor_layers.forEach(function(l){
        h += '<div class="sl"><div class="sl-hd" style="background:'+(l.color||'linear-gradient(90deg,#8b5cf6,#a78bfa)')+'">'+l.name+'</div>';
        h += '<table class="sl-tbl"><colgroup><col style="width:24%"/><col style="width:14%"/><col style="width:16%"/><col style="width:16%"/><col/></colgroup><tr><th>标的</th><th>细分</th><th>现价</th><th>入场</th><th>逻辑</th></tr>';
        l.stocks.forEach(function(s){ h += '<tr><td><strong>'+s.code+'</strong> '+s.name+'</td><td>'+s.sub+'</td><td>'+s.price+'</td><td>'+s.entry+'</td><td>'+s.logic+'</td></tr>'; });
        h += '</table></div>';
      });
      h += '</div>';
    }
  }

  // ═══ Execution Plan ═══
  if (data.execution_plan) {
    var ep = data.execution_plan;
    h += '<div class="dv"><span>执行计划</span></div>';
    h += '<div class="card"><h2>Phase 状态</h2><div style="font-size:13px;line-height:2.2">';
    (ep.phases||[]).forEach(function(p){ h += '<span class="pt '+p.cls+'">'+p.name+'</span> '+p.status+' · '+p.desc+'<br>'; });
    h += '</div>';
    if (ep.firepower) h += '<div class="nt" style="margin-top:10px">'+ep.firepower+'</div>';
    h += '</div>';
    if (ep.panels) {
      h += '<div style="font-weight:600;font-size:14px;margin-top:8px">操作建议</div>';
      ep.panels.forEach(function(p){ h += '<div class="pn pn-'+p.cls+'"><strong style="color:'+p.title_color+'">'+p.title+'</strong><br>'+p.content+'</div>'; });
    }
  }

  panel.innerHTML = h;
}

function showMkt(k) {
  ['us_stocks','hk_stocks','korea','a_stocks'].forEach(function(x,i){
    var t = document.getElementById('mt-'+x), p = document.getElementById('mp-'+x);
    if (!t||!p) return;
    p.style.display = (x===k)?'':'none';
  });
  var cls = {'us_stocks':'mt-us','hk_stocks':'mt-hk','korea':'mt-kr','a_stocks':'mt-cn'};
  document.querySelectorAll('.mt-item').forEach(function(t){ t.className = 'mt-item '+(cls[t.id.replace('mt-','')]||''); });
  var sel = document.getElementById('mt-'+k);
  if (sel) sel.classList.add('act');
}
</script>
<script>
// v5 research renderer
function renderResearch(data, panel) {
  if (!data) { panel.innerHTML = '<div class="empty"><h3>暂无研报</h3><p>运行「生成研报」获取最新报告</p></div>'; return; }
  var h = '';
  h += '<div class="card-dark"><h2>AI产业链深度研报</h2><div class="sub">'+(data.title||'')+' · 数据截至'+(data.date||'')+'</div></div>';

  // M1
  if (data.module1) {
    h += '<div class="mod"><div class="mod-hd">AI产业链景气仪表</div><div class="mod-bd">';
    if (data.module1.rows) {
      h += '<table><colgroup><col/><col/><col/><col/></colgroup><tr><th>层级</th><th>环节</th><th>信号</th><th>核心变化</th></tr>';
      data.module1.rows.forEach(function(r){
        var sig = r.signal==='green'?'<span class="sg sg2"></span><span class="tg tg-g">强劲</span>':r.signal==='yellow'?'<span class="sg sy"></span><span class="tg tg-y">偏强</span>':'<span class="sg sr"></span><span class="tg tg-r">偏弱</span>';
        h += '<tr><td>'+r.layer+'</td><td>'+r.segment+'</td><td>'+sig+'</td><td>'+r.detail+'</td></tr>';
      });
      h += '</table>';
    }
    if (data.module1.ai_judgment) h += '<div class="ai" style="margin-top:12px"><strong>AI判断</strong><br>'+data.module1.ai_judgment+'</div>';
    h += '</div></div>';
  }

  // M2
  if (data.module2) {
    h += '<div class="mod"><div class="mod-hd">上游深度分析</div><div class="mod-bd">';
    ['materials','equipment'].forEach(function(k){
      var sec = data.module2[k]; if (!sec) return;
      h += '<div class="sec"><div class="sec-ttl">'+(k==='materials'?'半导体材料':'芯片设备')+'</div>';
      if (sec.table) {
        h += '<table><colgroup><col/><col/><col/><col/><col/></colgroup><tr><th>细分</th><th>标的</th><th>现价</th><th>周涨跌</th><th>动态</th></tr>';
        sec.table.forEach(function(r){
          var chg = r.change>=0?'<span class="up">+'+r.change+'%</span>':'<span class="dn">'+r.change+'%</span>';
          h += '<tr><td>'+r.sub+'</td><td><strong>'+r.code+'</strong> '+r.name+'</td><td>'+r.price+'</td><td>'+chg+'</td><td>'+r.detail+'</td></tr>';
        });
        h += '</table>';
      }
      if (sec.ai_judgment) h += '<div class="ai" style="margin-top:10px"><strong>AI判断</strong><br>'+sec.ai_judgment+'</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // M3
  if (data.module3 && data.module3.sections) {
    h += '<div class="mod"><div class="mod-hd">中游核心层 (MLCC / HBM / 光模块)</div><div class="mod-bd">';
    data.module3.sections.forEach(function(sec){
      h += '<div class="sec"><div class="sec-ttl">'+sec.title+'</div>';
      if (sec.text) h += '<p style="font-size:13px;line-height:1.8;margin-bottom:10px">'+sec.text+'</p>';
      if (sec.dashboard) {
        h += '<div class="dg">';
        sec.dashboard.forEach(function(d){ h += '<div class="dc"><div class="v" style="color:'+(d.color||'#ef4444')+'">'+d.value+'</div><div class="l">'+d.label+'</div><div class="s">'+d.sub+'</div></div>'; });
        h += '</div>';
      }
      if (sec.table) {
        var cg = '';
        sec.table.headers.forEach(function(){ cg += '<col/>'; });
        h += '<table><colgroup>'+cg+'</colgroup><tr>'; sec.table.headers.forEach(function(th, idx){ h += '<th>'+th+'</th>'; }); h += '</tr>';
        sec.table.rows.forEach(function(r){ h += '<tr>'; r.forEach(function(c){ h += '<td>'+c+'</td>'; }); h += '</tr>'; });
        h += '</table>';
      }
      h += '</div>';
    });
    h += '</div></div>';
  }

  // M4-5 — 兼容新旧两种格式
  [4,5].forEach(function(n){
    var mod = data['module'+n]; if (!mod) return;
    h += '<div class="mod"><div class="mod-hd">'+(n===4?'中游封装/PCB':'下游AI应用')+'</div><div class="mod-bd">';
    var sections = mod.sections;
    if (sections && sections.length) {
      sections.forEach(function(sec){
        h += '<div class="sec"><div class="sec-ttl">'+sec.title+'</div>';
        if (sec.table) {
          var cg = '';
          sec.table.headers.forEach(function(){ cg += '<col/>'; });
          h += '<table><colgroup>'+cg+'</colgroup><tr>'; sec.table.headers.forEach(function(th, idx){ h += '<th>'+th+'</th>'; }); h += '</tr>';
          sec.table.rows.forEach(function(r){ h += '<tr>'; r.forEach(function(c){ h += '<td>'+c+'</td>'; }); h += '</tr>'; });
          h += '</table>';
        }
        if (sec.text) h += '<p style="font-size:13px;line-height:1.8;color:var(--tx-body)">'+sec.text+'</p>';
        if (sec.ai_judgment) h += '<div class="ai" style="margin-top:10px"><strong>AI判断</strong><br>'+sec.ai_judgment+'</div>';
        h += '</div>';
      });
    } else {
      // 旧格式：直接遍历已知子对象（server / cloud / materials / equipment）
      ['server','cloud','materials','equipment'].forEach(function(subKey){
        if (!mod[subKey]) return;
        var sub = mod[subKey];
        if (typeof sub !== 'object' || sub === null) return;
        Object.keys(sub).forEach(function(k){
          if (k === 'subtitle') {
            h += '<div class="sec"><div class="sec-ttl">'+sub[k]+'</div></div>';
          } else if (k.indexOf('ai_judgment') === 0) {
            h += '<div class="ai" style="margin-top:10px"><strong>AI判断</strong><br>'+sub[k]+'</div>';
          } else if (typeof sub[k] === 'string') {
            h += '<p style="font-size:13px;line-height:1.8;margin-bottom:10px;color:var(--tx-body)"><strong>'+k+'</strong><br>'+sub[k]+'</p>';
          }
        });
      });
    }
    h += '</div></div>';
  });

  // M6
  if (data.module6 && (data.module6.review || data.module6.thresholds)) {
    h += '<div class="mod"><div class="mod-hd">标的审查 + 阈值重算</div><div class="mod-bd">';
    if (data.module6.review) {
      h += '<div class="sec"><div class="sec-ttl">持仓审查</div><table><colgroup><col/><col/><col/><col/></colgroup><tr><th>标的</th><th>成本/现价</th><th>浮亏</th><th>评估</th></tr>';
      data.module6.review.forEach(function(r){
        var pnlColor = (r.pnl != null && r.pnl >= 0) ? 'var(--red)' : (r.pnl != null ? 'var(--green)' : '');
        h += '<tr><td><strong>'+r.code+'</strong> '+r.name+'</td><td>'+r.cost+'/'+r.current+'</td><td style="color:'+pnlColor+'">'+(r.pnl!=null?(r.pnl>=0?'+':'')+r.pnl+'%':'--')+'</td><td><span class="bad '+(r.tag_class||'bg')+'">'+r.tag+'</span> '+r.note+'</td></tr>';
      });
      h += '</table></div>';
    }
    if (data.module6.thresholds) {
      h += '<div class="sec"><div class="sec-ttl">阈值重算</div><table><colgroup><col/><col/><col/></colgroup><tr><th>标的</th><th>新阈值</th><th>理由</th></tr>';
      data.module6.thresholds.forEach(function(t){ h += '<tr><td><strong>'+t.code+'</strong></td><td>'+t.new_threshold+'</td><td>'+t.reason+'</td></tr>'; });
      h += '</table></div>';
    }
    h += '</div></div>';
  }

  // M7
  if (data.module7 && data.module7.events) {
    h += '<div class="mod"><div class="mod-hd">催化剂日历'+(data.module7.subtitle||'')+'</div><div class="mod-bd">';
    data.module7.events.forEach(function(e){ 
      var impactLabel = e.impact ? '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-right:6px;'+(e.impact==='critical'?'background:rgba(231,76,60,.2);color:#e74c3c':e.impact==='high'?'background:rgba(243,156,18,.2);color:#f39c12':'background:rgba(149,165,166,.2);color:#95a5a6')+'">'+e.impact+'</span>' : '';
      h += '<div class="cl"><div class="cl-d">'+e.date+'</div><div class="cl-b"><strong>'+e.event+'</strong>'+impactLabel+'<br><span style="color:var(--tx2);font-size:12px;line-height:1.6">'+(e.detail||e.impact||'')+'</span></div></div>'; 
    });
    h += '</div></div>';
  }

  h += '</div></div>';
  panel.innerHTML = h;
}
</script>
<script>
// deep-dive.js — v8 自由格式·AI自主决定输出逻辑框架和外观样式
// 数据格式: { content: "完整HTML" } → 直接渲染
// 兼容旧格式: { sections: [...] } → 降级为simple-text渲染
function renderDeepDive(data, panel) {
  if (!data) {
    panel.innerHTML = '<div class="empty"><h3>暂无深度挖掘</h3><p>运行「深度挖掘：标的」获取分析</p></div>';
    return;
  }

  // ═══ 新格式: content 字段直接作为 HTML 渲染（AI 自由决定样式）═══
  if (data.content) {
    var h = '';
    // 标题区（从data元信息生成，不依赖content内重复标题）
    h += '<div class="card-dark"><h2>'+(data.emoji||'⛏')+' '+(data.title||'深度挖掘')+'</h2>';
    if (data.date || data.subtitle) {
      h += '<div class="sub">'+(data.date||'')+(data.subtitle?' · '+data.subtitle:'')+'</div>';
    }
    h += '</div>';
    // AI 自由输出的完整 HTML
    h += '<div class="dd-free-content">'+data.content+'</div>';
    panel.innerHTML = h;
    return;
  }

  // ═══ 旧格式: sections 数组 → simple-text 降级渲染 ═══
  if (data.sections && data.sections.length) {
    var h2 = '';
    h2 += '<div class="card-dark"><h2>'+(data.emoji||'')+' '+data.title+'</h2><div class="sub">'+(data.date||'')+' · '+(data.subtitle||'')+'</div></div>';
    data.sections.forEach(function(sec) {
      h2 += '<div class="card">';
      if (sec.title) h2 += '<h2>'+sec.title+'</h2>';
      var content = sec.content || sec.bull || '';
      if (sec.bear) content += '<br><br><b>Bear Case:</b><br>'+sec.bear;
      if (sec.days) { sec.days.forEach(function(d){ content += '<br><br><b>'+d.day+':</b> '+d.detail; }); }
      if (sec.headers && sec.rows) {
        content += '<table><tr>';
        sec.headers.forEach(function(hh){ content += '<th>'+hh+'</th>'; });
        content += '</tr>';
        sec.rows.forEach(function(r){ content += '<tr>'; r.forEach(function(c){ content += '<td>'+c+'</td>'; }); content += '</tr>'; });
        content += '</table>';
      }
      h2 += '<div style="font-size:13px;line-height:1.8">'+content+'</div></div>';
    });
    panel.innerHTML = h2;
    return;
  }

  // ═══ 无数据 ═══

  else if (type === 'deepdive') d = DATA.deepDive;

  if (!d) return '--';
  // generated_at: may be full "YYYY-MM-DD HH:MM" (injected by build.py) or just "HH:MM" (source data)
  var gen = d.generated_at;
  if (gen) {

  var dateStr = d.date || '';

  return '--';
}

function histLinks() {
  var registry = HIST_REGISTRY[ACTIVE] || [];
  var now = new Date();
  var cutoff = new Date(now);
  cutoff.setDate(cutoff.getDate() - 30);

  // Split: active (≤30d) vs archived (>30d)
  var active = [];
  var archived = [];
  registry.forEach(function(e) {
    // Check if entry has explicit archived flag
    if (e.archived) {
      archived.push(e);
    } else {
      // Try to parse date from label
      var dateMatch = e.label ? e.label.match(/^(\d{4}-\d{2}-\d{2})/) : null;
      if (dateMatch) {
        var entryDate = new Date(dateMatch[1]);
        if (entryDate < cutoff) {
          archived.push(e);
        } else {
          active.push(e);
        }
      } else {
        active.push(e);
      }
    }
  });

  var s = '';

  // ── 当前数据条目（始终显示，等同于"返回最新数据"）──
  var curData = null, curLabel = '', curDate = '';
  if (ACTIVE === 'daily' && ORIG_DATA.daily) {
    curDate = ORIG_DATA.daily.generatedAt || new Date().toISOString().slice(0,10);
    curLabel = curDate;
  } else if (ACTIVE === 'research' && ORIG_DATA.research) {
    curDate = ORIG_DATA.research.date || new Date().toISOString().slice(0,10);
    curLabel = curDate;
  } else if (ACTIVE === 'deepdive' && ORIG_DATA.deepDive) {
    curDate = ORIG_DATA.deepDive.date || '';
    curLabel = (ORIG_DATA.deepDive.name || '深度挖掘') + (curDate ? ' · ' + curDate : '');
  } else if (ACTIVE === 'free' && ORIG_DATA.freeAnalysis) {
    curDate = ORIG_DATA.freeAnalysis.date || '';
    // 截断过长的title
    var ft = ORIG_DATA.freeAnalysis.title || '自由分析';
    curLabel = (ft.length > 20 ? ft.slice(0,20)+'…' : ft) + (curDate ? ' · ' + curDate : '');
  }

  if (!active.length && !archived.length && !curLabel) {
    s += '<div class="hdd-empty">暂无历史记录</div>';
  }

  // ── 当前数据（等同于"返回最新数据"，始终显示在最前面）──
  if (curLabel) {
    s += '<div class="hdd-header">📅 近30天记录</div>';
    s += '<div class="hdd-item" onclick="backToLatest()">';
    s += '<span class="hdd-date">'+(curDate || '当前')+'</span>';
    s += '<span class="hdd-label">'+curLabel+'</span>';
    s += '</div>';
  }

  // ── 历史注册表条目（活跃区 ≤30天）──
  if (active.length > 0) {
    if (!curLabel) s += '<div class="hdd-header">📅 近30天记录</div>';
    active.forEach(function(e, i) {
      var stem = e.date; // e.date already is the full filename stem (e.g., "2026-07-12_全持仓策略4标综合")
      // Extract display date from label (always starts with YYYY-MM-DD)
      var dm = e.label.match(/^(\d{4}-\d{2}-\d{2})/);
      var displayDate = dm ? dm[1] : e.date.slice(0, 10);
      s += '<div class="hdd-item" onclick="loadHist(\''+stem+'\')">';
      s += '<span class="hdd-date">'+displayDate+'</span>';
      s += '<span class="hdd-label">'+e.label+'</span>';
      s += '</div>';
    });
  }

  // Archive section (>30 days)
  if (archived.length > 0) {
    s += '<div class="hdd-header hdd-arch-header">📦 归档记录 · ' + archived.length + '条</div>';
    archived.forEach(function(e) {
      var stem = e.date; // e.date already is the full filename stem
      var dm = e.label.match(/^(\d{4}-\d{2}-\d{2})/);
      var displayDate = dm ? dm[1] : e.date.slice(0, 10);
      s += '<div class="hdd-item hdd-archived" onclick="loadHist(\''+stem+'\')">';
      s += '<span class="hdd-date">'+displayDate+'</span>';
      s += '<span class="hdd-label">'+e.label+'</span>';
      s += '</div>';
    });

  // Back to latest (when in history mode)
  if (HIST_MODE) {
    s += '<div class="hdd-item hdd-back" onclick="backToLatest()">← 返回最新数据</div>';
  }

  // Footer note
  s += '<div class="hdd-footer">📌 历史文件永久保留 · 30天自动归档</div>';
  return s;
}

function loadHist(stem) {
  var dd = document.getElementById('hdd');
  if (dd) dd.classList.remove('show');

  var tabDir = ACTIVE === 'deepdive' ? 'deep_dive' : ACTIVE === 'free' ? 'free_analysis' : ACTIVE;

  var p = document.getElementById('pc');

  // Use fetch instead of dynamic script for reliability
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      // Execute in isolated scope, extract the variable
      var fn = new Function(text + '; return ' + varName + ';');
      var histData = fn();
      if (!histData) {
        throw new Error('数据为空');
      }
      // Update DATA with history
      if (ACTIVE === 'daily') DATA.daily = histData;
      else if (ACTIVE === 'research') DATA.research = histData;
      else if (ACTIVE === 'deepdive') DATA.deepDive = histData;
      else if (ACTIVE === 'free') DATA.freeAnalysis = histData;
      HIST_MODE = true;
      window._histLoading = true;
      switchTab(ACTIVE);

/* ═══ SMART COLORIZE v4.2 — 表格td + 描述文本 + 进度条数值继承柱色 ═══ */
function smartColorize(panel) {
  if (!panel) return;

  function _colorPct(html) {
    var o = html;
    // Pass 1: Threshold symbols ≤ ≥ → neutral gold
    html = html.replace(/([≤≥])(\d+(?:\.\d+)?%)/g, '$1<span class="price">$2</span>');
    // Pass 2: ~ approximate values → neutral gold (incl ~-XX%), skip if already contains span
    html = html.replace(/~([+-]?\d+(?:\.\d+)?%)/g, function(m, pct) {
      return '~<span class="price">' + pct + '</span>';
    });
    // Pass 3: Signed pure percentages, NOT part of ranges, NOT inside existing spans
    html = html.replace(
      /(?<![-\d.<])([+-])(\d+(?:\.\d+)?)%(?![-\d>])/g,
      function(m, sign, num) {
        return '<span class="' + (sign === '+' ? 'up' : 'dn') + '">' + m + '</span>';
      }
    );
    return html===o?null:html;
  }
  function _skip(el){
    if(!el)return true;
    if(el.closest('.ai,.bl,.br2'))return true;
    // 修复：原选择器 .span.dn 是错误的class（应为 span.dn）
    if(el.querySelector('span.up, span.dn, span.price'))return true;
    var s=el.getAttribute('style');
    // 已有内联color样式 → 不重复着色（但确保负数是绿色）
    if(s&&s.indexOf('color')!==-1)return true;
    return false;
  }
  function _barToText(bg){
    if(!bg)return null;
    var b=bg.toLowerCase();
    if(b.indexOf('#22c5')>=0||b.indexOf('#34d3')>=0||b.indexOf('green')>=0||b.indexOf('rgb(34,')>=0||b.indexOf('rgb(52,')>=0)return'var(--green)';
    if(b.indexOf('#ef44')>=0||b.indexOf('#f59')>=0||b.indexOf('#ea58')>=0||b.indexOf('amber')>=0||b.indexOf('red')>=0||b.indexOf('rgb(239,')>=0||b.indexOf('rgb(245,')>=0||b.indexOf('rgb(234,')>=0||b.indexOf('rgb(251,')>=0)return'var(--gold)';
    if(b.indexOf('#5b8f')>=0||b.indexOf('#3b82')>=0||b.indexOf('blue')>=0||b.indexOf('rgb(91,')>=0||b.indexOf('rgb(59,')>=0)return'var(--blue)';
    return null;
  }

  /* ① td表格着色 */
  panel.querySelectorAll('td').forEach(function(td){
    if(_skip(td))return; var h=td.innerHTML;if(!h||!h.trim())return;
    var r=_colorPct(h);if(r)td.innerHTML=r;
  });
  /* ② 非表格文本着色 — 合并为单次querySelectorAll */
  panel.querySelectorAll('.br-v,.mr-v,.mr-d,.ev-t,.ev-b,.cl-b').forEach(function(el){
      if(_skip(el))return; var h=el.innerHTML;if(!h||!h.trim())return;
      var r=_colorPct(h);if(r)el.innerHTML=r;
    });
  /* ③ 进度条数值继承柱子语义色：.br-v ↔ 同行.br-f背景色→文字色 */
  panel.querySelectorAll('.brw').forEach(function(row){
    var bar=row.querySelector('.br-f'),val=row.querySelector('.br-v');
    if(!bar||!val)return;
    if(val.querySelector('span.up, span.dn'))return;
    var s=val.getAttribute('style');if(s&&s.indexOf('color')!==-1)return;
    var tc=_barToText(bar.style.background||bar.style.backgroundColor);
    if(tc)val.style.color=tc;
  });
  /* ④ Dashboard卡片语义着色 */
  panel.querySelectorAll('.dc .v').forEach(function(el){
    if(el.querySelector('span.up, span.dn'))return;
    var s=el.getAttribute('style');if(s&&s.indexOf('color')!==-1)return;
    var t=el.textContent.trim();
    if(/^\+/.test(t)||/涨/.test(t))el.style.color='var(--red)';
    else if(/^-/.test(t)||/跌/.test(t))el.style.color='var(--green)';
    else if(/^~/.test(t))el.style.color='var(--tx2)';
  });
  /* ⑤ EVENT TAGS: 统一琥珀高亮 */
  panel.querySelectorAll('.et').forEach(function(el){
    var cls=el.className;
    if(/ei|eh|ec|em|ek/.test(cls))return;
    el.style.cssText+='background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.18);';
  });
}
