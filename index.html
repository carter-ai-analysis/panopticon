<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PANOPTICON · AI全球资产配置</title>
<style>
/* ══════════════════════════════════════════════════════════════
   PANOPTICON v11 — 投行IPO级暗色终端 · 设计DNA来源：专业投顾仪表盘
   核心原则：近黑底 + 三层卡片深度 + 金色数据系统 + 高对比文字
   ══════════════════════════════════════════════════════════════ */

/* ═══ DESIGN TOKENS ═══ */
:root {
  /* Canvas — 近黑海军蓝（比v10深一个档次）*/
  --bg: #0a0e1a;

  /* Card surfaces — 三层深度系统 */
  --card: #111827;          /* Level 1: 主内容卡片 */
  --card-in: #161f2d;       /* Level 2: 内嵌卡片(风险项/子模块) */
  --card-hi: #1c2638;       /* Level 3: hover/highlight */

  /* Text hierarchy — 高对比度可读性优先 */
  --tx: #e8ecf4;            /* 主文字（标题/重要内容）— 近白 */
  --tx-title: #e8ecf4;       /* 自由格式标题 — 与 --tx 相同 */
  --tx-body: #b4bcc8;        /* 正文（段落/描述）— 可读灰 */
  --tx2: #8896ab;           /* 辅助文字（标签/副标题）— 中灰蓝 */
  --tx3: #5a6577;           /* 弱化文字（提示/占位）— 深灰 */
  --tx4: #3a4556;           /* 极弱化（placeholder级别）*/
  
  /* Fonts */
  --font-mono: "SF Mono", Menlo, Consolas, monospace;

  /* Borders — 极微妙，几乎不可见 */
  --line: rgba(255,255,255,.06);      /* 卡片边框 */
  --line-hover: rgba(255,255,255,.10); /* hover时稍明显 */
  --line-strong: rgba(255,255,255,.14); /* 分隔线/表头底线 */

  /* Semantic colors — 保持中国股市习惯 */
  --red: #ef4444;
  --green: #22c55e;

  /* Accent palette — 从截图中提取的完整色板 */
  --gold: #d4a853;           /* ★ 核心强调色：大数字/价格/评分/激活态 */
  --gold-dim: rgba(212,168,83,.12);
  --gold-glow: rgba(212,168,83,.20);

  --blue: #5b8fde;           /* 次要数据/图表柱 */
  --blue-dim: rgba(91,143,222,.12);

  --cyan: #38bdf8;           /* 折线图/时间线 */
  --green-accent: #34d399;   /* 正面指标/绿色类别条 */
  --purple: #a78bfa;         /* 紫色类别条/AI面板 */
  --amber: #f59e0b;          /* 警告/中等严重度 */
  --orange: #ea580c;         /* 触发/信号 */

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
}

/* ═══ RESET & BASE ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Inter", -apple-system, "PingFang SC", "Noto Sans SC",
               "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--tx-body);
  font-size: 14px;
  line-height: 1.68;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.wrap { max-width: 1120px; margin: 0 auto; padding: 24px 28px 56px; }
@media (max-width: 768px) { .wrap { padding: 14px 16px 40px; } }

/* ═══ BANNER — 导航顶栏（与页面底色有明显区隔·悬浮感）═══ */
.banner {
  background: linear-gradient(180deg, rgba(20,28,46,.95) 0%, #111827 100%);
  border-radius: 0 0 16px 16px;
  padding: 32px 36px 24px;
  margin-bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
/* 顶部极光扫描线 */
.banner::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 100%;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%, var(--cyan) 30%, var(--gold) 50%, var(--purple) 70%, transparent 100%);
  animation: auroraScan 4s ease-in-out infinite;
}
@keyframes auroraScan {
  0% { left: -100%; right: 100%; opacity: 0; }
  20% { opacity: 1; }
  80% { left: 10%; right: 10%; opacity: .8; }
  100% { left: 110%; right: -10%; opacity: 0; }
}

/* ═══ 品牌标题 — 炫酷大字 ═══ */
.brand-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.brand {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  line-height: 1;
  /* 多层渐变：白→金→琥珀，带金属质感 */
  background: linear-gradient(
    135deg,
    #ffffff 0%,
    #f0e6d3 15%,
    var(--gold) 35%,
    #f59e0b 55%,
    #d97706 75%,
    var(--gold) 90%,
    #fff 100%
  );
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: brandShimmer 5s ease-in-out infinite, brandGlow 3s ease-in-out infinite alternate;
  filter: drop-shadow(0 2px 8px rgba(212,168,83,.35)) drop-shadow(0 0 40px rgba(212,168,83,.12));
  user-select: none;
}
@keyframes brandShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes brandGlow {
  0% { filter: drop-shadow(0 2px 8px rgba(212,168,83,.35)) drop-shadow(0 0 40px rgba(212,168,83,.12)); }
  100% { filter: drop-shadow(0 2px 12px rgba(212,168,83,.5)) drop-shadow(0 0 60px rgba(212,168,83,.2)); }
}
.brand-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--tx3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding-left: 4px;
}
.bs-icon {
  color: var(--gold);
  font-size: 8px;
  vertical-align: middle;
}
.bs-sep {
  color: var(--line-strong);
  margin: 0 4px;
}
.bs-status {
  color: var(--green-accent);
  font-weight: 700;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 11px;
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .5; }
}
/* ═══ 历史下拉增强样式（v12）═══ */
.hdd-header {
  font-size: 11px;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 10px 14px 6px;
  border-bottom: 1px solid var(--line);
  font-weight: 600;
}
.hdd-date {
  display: block;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--gold);
  font-weight: 600;
}
.hdd-label {
  display: block;
  font-size: 13px;
  color: var(--tx2);
  margin-top: 1px;
}
.hdd-back {
  border-top: 2px solid var(--line) !important;
  color: var(--cyan) !important;
  font-weight: 700 !important;
  margin-top: 4px !important;
}


@media (max-width: 768px) {
  .banner { flex-direction: column; gap: 14px; align-items: flex-start; padding: 24px 16px 20px; }
  .brand { font-size: 28px; letter-spacing: 4px; }
  .brand-sub { font-size: 11px; letter-spacing: 1.5px; }
}

/* ═══ TOP BAR — Tab导航 + 时间 + 历史 ═══ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 24px 0 18px;
}
.tn {
  display: flex;
  gap: 3px;
  background: var(--card);
  border-radius: 10px;
  padding: 4px;
  border: 1px solid var(--line);
}
.tn a {
  padding: 9px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--tx2);
  text-decoration: none;
  transition: all .2s ease;
  letter-spacing: .1px;
}
.tn a:hover {
  color: var(--tx);
  background: var(--card-hi);
}
.tn a.act {
  background: linear-gradient(135deg, var(--gold), #c99530);
  color: #0a0e1a;
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(212,168,83,.25);
}
.tb-right { display: flex; align-items: center; gap: 10px; }
.tb-time {
  font-size: 12px;
  color: var(--tx2);
  padding: 6px 14px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--line);
}
.tb-time b { color: var(--tx); font-weight: 600; }

/* History dropdown */
.hw { position: relative; }
.hbtn {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--tx2);
  font-family: inherit;
  transition: all .15s ease;
}
.hbtn:hover { border-color: var(--gold); color: var(--gold); }
.hbtn::after { content: '\25BE'; font-size: 9px; margin-left: 4px; }
.hdd {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #151d2e;
  border: 1px solid var(--line-hover);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  min-width: 220px;
  z-index: 100;
  overflow: hidden;
}
.hdd.show { display: block; }
.hdd-item {
  display: block;
  padding: 11px 18px;
  font-size: 12px;
  color: var(--tx-body);
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.04);
  transition: background .12s;
}
.hdd-item:last-child { border-bottom: none; }
.hdd-item:hover { background: var(--card-hi); color: var(--gold); }
.hdd-arch-header {
  color: var(--tx3) !important;
  font-size: 10px !important;
  letter-spacing: 1px !important;
  border-top: 2px solid var(--line) !important;
}
.hdd-archived { opacity: 0.65; }
.hdd-archived:hover { opacity: 1; }
.hdd-footer {
  font-size: 10px;
  color: var(--tx3);
  text-align: center;
  padding: 10px 14px 12px;
  border-top: 1px solid var(--line);
}
.hdd-empty {
  padding: 24px 18px;
  color: var(--tx3);
  text-align: center;
  font-size: 12px;
  line-height: 1.8;
}

/* ═══ MARKET TABS — 4列市场切换（参考截图的tag chip风格）═══ */
.mt {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}
.mt-item {
  text-align: center;
  padding: 14px 8px 11px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .25s ease;
  border: 1px solid var(--line);
  background: var(--card);
  position: relative;
  overflow: hidden;
}
.mt-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--c, var(--blue));
  opacity: 0;
  transition: opacity .25s;
}
/* Market tab hover — each market gets its own accent color on hover */
.mt-item:hover {
  transform: translateY(-2px);
}
.mt-item:hover::before { opacity: .6; }
.mt-us:hover {
  border-color: rgba(91,143,222,.35);
  background: rgba(91,143,222,.06);
  box-shadow: 0 6px 24px rgba(91,143,222,.15);
}
.mt-hk:hover {
  border-color: rgba(245,158,11,.35);
  background: rgba(245,158,11,.06);
  box-shadow: 0 6px 24px rgba(245,158,11,.15);
}
.mt-kr:hover {
  border-color: rgba(167,139,250,.35);
  background: rgba(167,139,250,.06);
  box-shadow: 0 6px 24px rgba(167,139,250,.15);
}
.mt-cn:hover {
  border-color: rgba(34,197,94,.3);
  background: rgba(34,197,94,.05);
  box-shadow: 0 6px 24px rgba(34,197,94,.12);
}
.mt-item .s {
  font-size: 28px;
  font-weight: 800;
  display: block;
  line-height: 1.1;
}
.mt-item .l {
  font-size: 11px;
  color: var(--tx2);
  margin-top: 4px;
  letter-spacing: .2px;
}
/* Market tab active states — each market gets its own accent color */
.mt-us.act {
  border-color: rgba(91,143,222,.35);
  background: rgba(91,143,222,.08);
  color: #93bbfd;
  --c: #5b8fde;
}
.mt-us.act::before { background: #5b8fde; opacity: 1; }
.mt-hk.act {
  border-color: rgba(245,158,11,.35);
  background: rgba(245,158,11,.08);
  color: #fbbf24;
  --c: #f59e0b;
}
.mt-hk.act::before { background: #f59e0b; opacity: 1; }
.mt-kr.act {
  border-color: rgba(167,139,250,.35);
  background: rgba(167,139,250,.08);
  color: #c4b5fd;
  --c: #a78bfa;
}
.mt-kr.act::before { background: #a78bfa; opacity: 1; }
.mt-cn.act {
  border-color: rgba(34,197,94,.3);
  background: rgba(34,197,94,.07);
  color: #4ade80;
  --c: #22c55e;
}
.mt-cn.act::before { background: #22c55e; opacity: 1; }

/* ═══ CARDS — 三层深度卡片系统（核心组件）═══ */
.card {
  background: var(--card);
  border-radius: var(--r-lg);
  border: 1px solid var(--line);
  padding: 24px 26px;
  margin-bottom: 16px;
  overflow-x: auto;           /* 表格溢出时横向滚动 */
  overflow-y: visible;        /* 纵向不裁剪（tooltip等）*/
  position: relative;
  transition: border-color .2s, box-shadow .2s;
}
.card:hover {
  border-color: var(--line-hover);
  box-shadow: 0 4px 28px rgba(0,0,0,.25);
}
.card h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--tx);
}
.card h2::before {
  content: '';
  width: 4px;
  height: 17px;
  border-radius: 2px;
  background: var(--gold);
  flex-shrink: 0;
}

/* card-dark — 用于研报头部等特殊区块 */
.card-dark {
  background: linear-gradient(135deg, #111827, #162033);
  color: var(--tx);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 24px 28px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.card-dark h2 { font-size: 18px; font-weight: 700; color: var(--tx); }
.card-dark h2::before { display: none; }
.card-dark .sub { font-size: 12.5px; opacity: .55; margin-top: 5px; color: var(--tx2); }

/* ═══ BADGES / TAGS / PILLS（参考截图中的severity badge和tag chip）═══ */
.bad {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .2px;
}
.br { background: rgba(239,68,68,.12); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
.bg { background: rgba(34,197,94,.12); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
.bb { background: var(--blue-dim); color: #93b5f7; border: 1px solid rgba(91,143,222,.2); }
.ba { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }
.bp { background: rgba(167,139,250,.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,.2); }

/* ═══ TABLES — 全左对齐 + 暗色主题适配（关键！之前v10这里最乱）═══ */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: auto;
}
th {
  text-align: left;
  padding: 11px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--tx2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--line-strong);
  background: #0c1018;
  white-space: nowrap;
}
td {
  padding: 11px 14px;
  border-bottom: 1px solid rgba(255,255,255,.03);
  vertical-align: middle;
  text-align: left;
  color: var(--tx-body);
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,.02); }
tbody tr:hover td:first-child { color: var(--tx); }

/* 股市颜色约定 */
.up { color: var(--red); font-weight: 700; }
.dn { color: var(--green); font-weight: 700; }
/* 价格/金额 — 仅用于阈值百分比（由 smartColorize v3 自动添加）*/
.price { color: var(--gold); font-weight: 700; }
/* smartColorize v3 内嵌span — 只给涨跌百分比着色 */
td span.up, .mod-bd span.up { color: var(--red); font-weight: 700; }
td span.dn, .mod-bd span.dn { color: var(--green); font-weight: 700; }
/* 安全网：任何包含负数百分比的td（即使有内联样式）强制绿色 */
/* 表格中的普通数字保持默认色（var(--tx-body)），不再额外标注 */
.r-up { background: rgba(239,68,68,.05)!important; }
.r-dn { background: rgba(34,197,94,.05)!important; }
.r-wa { background: rgba(245,158,11,.05)!important; }
.r-in { background: var(--blue-dim)!important; }

/* ═══ K线表（7列 fixed）═══ */
.kline-tbl { table-layout: fixed; }
.kline-tbl col:nth-child(1) { width: 8%; }
.kline-tbl col:nth-child(2) { width: 15%; }
.kline-tbl col:nth-child(3) { width: 15%; }
.kline-tbl col:nth-child(4) { width: 15%; }
.kline-tbl col:nth-child(5) { width: 15%; }
.kline-tbl col:nth-child(6) { width: 14%; }
.kline-tbl col:nth-child(7) { width: 18%; }

/* ═══ 股票层级表 sl-tbl（5列）═══ */
.sl-tbl { table-layout: fixed; }
.sl-tbl col:nth-child(1) { width: 26%; }
.sl-tbl col:nth-child(2) { width: 14%; }
.sl-tbl col:nth-child(3) { width: 14%; }

.sl-tbl col:nth-child(5) { width: 32%; }

/* ═══ 研报 M1 景气仪表（4列·fixed+nowrap）═══ */
.mod-bd > table:first-of-type { table-layout: fixed; }
.mod-bd > table:first-of-type col:nth-child(1) { width: 7%; }
.mod-bd > table:first-of-type col:nth-child(2) { width: 13%; }
.mod-bd > table:first-of-type col:nth-child(3) { width: 9%; }
.mod-bd > table:first-of-type td:nth-child(1),
.mod-bd > table:first-of-type td:nth-child(2),
.mod-bd > table:first-of-type td:nth-child(3) { white-space: nowrap; }

/* ═══ 研报 M2 上游分析（5列）═══ */
.mod-bd .sec > table:first-of-type { table-layout: fixed; }
.mod-bd .sec > table:first-of-type col:nth-child(1) { width: 8%; }
.mod-bd .sec > table:first-of-type col:nth-child(2) { width: 20%; }
.mod-bd .sec > table:first-of-type col:nth-child(3) { width: 10%; }
.mod-bd .sec > table:first-of-type col:nth-child(4) { width: 11%; }
.mod-bd .sec > table:first-of-type td:nth-child(1),
.mod-bd .sec > table:first-of-type td:nth-child(2),
.mod-bd .sec > table:first-of-type td:nth-child(3),
.mod-bd .sec > table:first-of-type td:nth-child(4) { white-space: nowrap; }

/* ═══ SCORE CIRCLES — 评分圆环（参考截图#53的大分数展示）═══ */
.sc-row { display: flex; align-items: center; gap: 22px; margin-bottom: 18px; }
.sc {
  width: 84px; height: 84px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; flex-shrink: 0;
  box-shadow: 0 8px 28px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
}
.sc .n { font-size: 34px; line-height: 1; }
.sc .l { font-size: 10px; opacity: .85; margin-top: 3px; letter-spacing: .3px; }
.sc-info { flex: 1; }
.sc-info .h { font-size: 16px; font-weight: 600; margin-bottom: 5px; color: var(--tx); }
.sc-info .d { font-size: 13px; color: var(--tx2); line-height: 1.65; }

.mc {
  width: 58px; height: 58px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
}
.mc .n { font-size: 22px; line-height: 1; }
.mc .l { font-size: 8px; opacity: .8; }

/* ═══ PROGRESS BARS — 双色调轨道+填充（参考截图#53/#55的bar chart）═══ */
.brw { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 13px; }
.brw:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.br-n { width: 95px; font-weight: 500; flex-shrink: 0; color: var(--tx-body); }
/* 柱子：弹性填充，拉长靠近右侧 */
.br-t { flex: 1; min-width: 120px; max-width: 420px; height: 8px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; }
.br-f { display: block; height: 100%; border-radius: 4px; min-width: 4px; }
/* 实际观测值：名称和柱子之间的数值列 */
.br-av { width: 52px; text-align: center; font-weight: 700; color: var(--tx); flex-shrink: 0; font-size: 12px; }
/* 分数+描述：紧贴柱子，整体左对齐 */
.br-v { text-align: center; font-weight: 600; color: var(--tx); flex-shrink: 0; min-width: 30px; margin-right: 10px; }
/* 描述文字：左对齐·纯灰·不染色 */
.br-d { text-align: left; font-size: 11px; color: var(--tx3); white-space: normal; max-width: 280px; }

/* Market rows */
.mr { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 12.5px; }
.mr:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.mr-n { width: 90px; font-weight: 500; flex-shrink: 0; color: var(--tx-body); }
.mr-av { width: 100px; text-align: center; font-weight: 700; color: var(--tx); flex-shrink: 0; font-size: 12px; }
.mr-v { width: 48px; text-align: center; font-weight: 600; flex-shrink: 0; color: var(--tx); }
.mr-d { flex: 1; color: var(--tx2); font-size: 11.5px; }

/* Events */
.ev { padding: 9px 0; font-size: 12.5px; line-height: 1.65; }
.ev:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.et { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 6px; letter-spacing: .2px; }
.ev-t { font-weight: 600; color: var(--tx-body); }
.ev-b { color: var(--tx2); margin-top: 3px; font-size: 12px; }
.ei { background: rgba(167,139,250,.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,.18); }
.eh { background: var(--blue-dim); color: #93b5f7; border: 1px solid rgba(91,143,222,.18); }
.ec { background: rgba(56,189,248,.12); color: #67d5f5; border: 1px solid rgba(56,189,248,.18); }
.em { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.18); }
.ek { background: rgba(168,85,247,.12); color: #d8b4fe; border: 1px solid rgba(168,85,247,.18); }

/* Tags for currency */
.trmb { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--blue-dim); color: #93b5f7; white-space: nowrap; }
.thkd { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(245,158,11,.12); color: #fbbf24; white-space: nowrap; }

/* Sum bar */
.sb {
  display: flex; align-items: center; justify-content: space-between;
  background: #0c1018; border-radius: 10px;
  padding: 12px 18px; margin-top: 14px; font-size: 12.5px;
  border: 1px solid var(--line);
}
.sb .lbl { font-weight: 500; color: var(--tx2); }
.sb .val { font-size: 18px; font-weight: 800; color: var(--gold); }

/* Stock layers */
.sl { margin-bottom: 14px; border-radius: 10px; overflow: hidden; border: 1px solid var(--line); }
.sl-hd { font-size: 12px; font-weight: 600; padding: 9px 16px; color: #fff; }
.sl-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin: 0; }
.sl-tbl th { padding: 8px 12px; font-size: 11px; background: #0c1018; border-bottom: 1px solid var(--line); white-space: nowrap; text-align: left; color: var(--tx2); }
.sl-tbl td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.03); text-align: left; color: var(--tx-body); }
.sl-tbl tr:last-child td { border-bottom: none; }
.sl-tbl td:first-child, .sl-tbl th:first-child { white-space: nowrap; }

/* Phase pills & Panels */
.pt { display: inline-block; padding: 3px 11px; border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: .2px; }
.pt-a { background: rgba(245,158,11,.15); color: #fbbf24; }
.pt-b { background: var(--blue-dim); color: #93b5f7; }
.pt-c { background: rgba(34,197,94,.12); color: #4ade80; }

.pn { padding: 16px 20px; border-radius: 10px; margin: 12px 0; font-size: 13px; line-height: 1.75; }
.pn-a { background: rgba(239,68,68,.05); border: 1px solid rgba(239,68,68,.15); border-left: 4px solid var(--red); }
.pn-b { background: rgba(34,197,94,.05); border: 1px solid rgba(34,197,94,.15); border-left: 4px solid var(--green); }
.pn-c { background: var(--blue-dim); border: 1px solid rgba(91,143,222,.15); border-left: 4px solid var(--blue); }
.pn-d { background: rgba(167,139,250,.06); border: 1px solid rgba(167,139,250,.15); border-left: 4px solid var(--purple); }

/* ═══ AI / Note / Alert PANELS（参考截图#57的风险提示卡片风格）═══ */
.ai {
  background: rgba(139,92,246,.06);
  border: 1px solid rgba(167,139,250,.15);
  border-left: 4px solid var(--purple);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 13px;
  line-height: 1.85;
  color: var(--tx-body);  /* 正文用灰白，不是全紫色 */
}
/* AI面板内标题/加粗 = 亮紫强调 */
.ai > strong:first-child,
.ai > b:first-child { color: var(--purple); font-weight: 700; }
/* AI面板内行内加粗 = 白色高亮 */
.ai strong, .ai b { color: var(--tx); font-weight: 700; }
/* AI面板内的表格/数值不让smartColorize误染色（已由js skip保护，此处兜底）*/
.ai td span.up, .ai td span.dn { color: inherit; font-weight: inherit; }
.nt {
  background: rgba(245,158,11,.05);
  border: 1px solid rgba(245,158,11,.12);
  border-left: 4px solid var(--amber);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 12.5px;
  color: #e8cf8a;
  line-height: 1.75;
}
.al {
  background: rgba(239,68,68,.05);
  border: 1px solid rgba(239,68,68,.12);
  border-left: 4px solid var(--red);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 12.5px;
  color: #fca5a5;
  line-height: 1.75;
}

/* Divider */
.dv {
  display: flex; align-items: center; gap: 14px;
  margin: 28px 0 14px;
  font-size: 13px; font-weight: 700;
  color: var(--gold);
}
.dv::before, .dv::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--line-hover), transparent); }

/* ═══ RESEARCH MODULES（研报模块 — 参考截图的section header风格）═══ */
.mod {
  margin-bottom: 18px;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.mod-hd {
  background: linear-gradient(135deg, #131b29, #182036);
  color: var(--tx);
  padding: 14px 22px;
  font-size: 15.5px;
  font-weight: 600;
  border-bottom: 1px solid var(--line);
  letter-spacing: .2px;
}
.mod-bd { padding: 22px 24px; background: var(--card); }
.sec { margin-bottom: 22px; }
.sec:last-child { margin-bottom: 0; }
.sec-ttl {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 14px;
  padding-left: 14px;
  border-left: 3px solid var(--gold);
}

/* Dashboard grid cards */
.dg { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.dc {
  background: #0c1018;
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  border: 1px solid var(--line);
}
.dc .v { font-size: 26px; font-weight: 800; /* 颜色由渲染器设置，smartColorize v4不再强制金色 */ }
.dc .l { font-size: 11.5px; color: var(--tx2); margin-top: 5px; }
.dc .s { font-size: 10px; color: var(--tx3); margin-top: 2px; }

/* Signal dots & tags */
.sg { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.sr { background: #ef4444; } .sy { background: #eab308; } .sg2 { background: #22c55e; }
.tg { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
.tg-r { background: rgba(239,68,68,.12); color: #f87171; }
.tg-g { background: rgba(34,197,94,.12); color: #4ade80; }
.tg-y { background: rgba(234,179,8,.15); color: #fbbf24; }

/* Checklist items */
.cl { display: flex; gap: 12px; padding: 9px 0; font-size: 13px; }
.cl:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.03); }
.cl-d {
  background: rgba(129,140,248,.12);
  color: #a5b4fc;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 6px;
  white-space: nowrap;
  min-width: 74px;
  text-align: center;
  font-size: 11px;
}
.cl-b { flex: 1; color: var(--tx-body); }

/* ═══ DEEP DIVE / FREE ANALYSIS MODULES ═══ */
.dual { display: flex; gap: 12px; margin: 14px 0; }
.bl {
  flex: 1;
  background: rgba(34,197,94,.04);
  border: 1px solid rgba(34,197,94,.12);
  border-left: 4px solid var(--green-accent);
  border-radius: 10px;
  padding: 16px 18px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--tx-body);
}
.br2 {
  flex: 1;
  background: rgba(239,68,68,.04);
  border: 1px solid rgba(239,68,68,.12);
  border-left: 4px solid var(--red);
  border-radius: 10px;
  padding: 16px 18px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--tx-body);
}
.bl .lbl { color: #4ade80; font-weight: 700; font-size: 12px; margin-bottom: 8px; }
.br2 .lbl { color: #f87171; font-weight: 700; font-size: 12px; margin-bottom: 8px; }
/* 双栏内文保持纯文本，禁止内嵌数值着色 */
.bl td, .br2 td { color: var(--tx-body); }
.bl span.up, .bl span.dn, .br2 span.up, .br2 span.dn { color: inherit!important; font-weight: inherit!important; }

.hlr {
  background: rgba(239,68,68,.05);
  border: 1px solid rgba(239,68,68,.2);
  border-left: 4px solid var(--red);
  border-radius: 12px;
  padding: 18px 20px;
  margin: 14px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--tx-body);
}
.hlr b { color: #f87171; }

.hlg {
  background: rgba(34,197,94,.05);
  border: 1px solid rgba(34,197,94,.2);
  border-left: 4px solid var(--green);
  border-radius: 12px;
  padding: 18px 20px;
  margin: 14px 0;
  font-size: 13px;
  line-height: 1.8;
  color: var(--tx-body);
}

/* Operation plan cards */
.op-big { display: flex; gap: 12px; margin: 14px 0; }
.op-d {
  flex: 1;
  background: var(--card);
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  border: 1px solid var(--line);
  transition: all .2s;
}
.op-d:hover { border-color: var(--line-hover); }
.op-d.hl { background: rgba(239,68,68,.05); border-color: rgba(239,68,68,.2); }
.op-d .d { font-size: 26px; font-weight: 800; color: var(--blue); }
.op-d.hl .d { color: var(--red); }
.op-d .act { font-size: 13px; font-weight: 600; margin: 8px 0; color: var(--tx); }
.op-d .amt { font-size: 17px; font-weight: 800; color: var(--gold); }
.op-d .det { font-size: 11px; color: var(--tx3); margin-top: 8px; white-space: pre-line; line-height: 1.5; }

.ver {
  background: var(--card-in);
  border: 1px solid rgba(91,143,222,.2);
  border-left: 4px solid var(--blue);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 14px 0;
  font-size: 13px;
  line-height: 1.9;
  color: var(--tx-body);
}
.ver h3 { color: #93b5f7; font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.rref { color: var(--purple); font-size: 11.5px; border-left: 3px solid var(--purple); padding-left: 12px; margin: 10px 0; line-height: 1.7; }

/* Timeline-style info list */
.tl { display: flex; gap: 0; margin: 14px 0; }
.tl-i {
  flex: 1;
  background: #0c1018;
  padding: 11px 8px;
  text-align: center;
  border-right: 2px solid var(--card);
  font-size: 11px;
  border-radius: 8px 0 0 8px;
}
.tl-i.lst { border-right: none; border-radius: 0 8px 8px 0; }
.tl-i .d { font-weight: 700; color: var(--blue); }
.tl-i .a { color: var(--tx2); margin-top: 4px; }

/* ═══ V7 EXTENDED MODULES — 深度挖掘+自由分析新增模块 ═══ */

/* Module 10: History Track */

.ht-card h4 { color: var(--gold); font-size: 13.5px; margin-bottom: 10px; font-weight: 600; }

/* Module 11: Sensitivity Analysis */

.sum-card h4 { color: var(--gold); font-size: 14.5px; margin-bottom: 14px; font-weight: 600; }
.sum-card .k3 { font-size: 13px; color: var(--tx-body); padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.sum-card .k3:last-child { border-bottom: none; }
.sum-card .k3 b { color: var(--gold); font-weight: 600; }

/* Policy card (free-analysis dim 8) */
.pol-card {
  background: rgba(245,158,11,.04);
  border: 1px solid rgba(245,158,11,.15);
  border-left: 4px solid var(--amber);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.pol-card h4 { color: #fbbf24; font-size: 13.5px; margin-bottom: 8px; font-weight: 600; }

/* Profit chain card (free-analysis dim 9) */
.prf-card {
  background: rgba(52,217,153,.03);
  border: 1px solid rgba(52,217,153,.12);
  border-left: 4px solid var(--green-accent);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.prf-card .wr { padding: 7px 0; color: #4ade80; font-weight: 600; border-bottom: 1px solid rgba(52,217,153,.08); }

/* Scenario card (free-analysis dim 10) */
.scn-card {
  background: var(--blue-dim);
  border: 1px solid rgba(91,143,222,.12);
  border-left: 4px solid var(--blue);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.scn-card h4 { color: #93b5f7; font-size: 13.5px; margin-bottom: 8px; font-weight: 600; }
.scn-card .ev { color: var(--tx-body); font-size: 13px; font-weight: 600; }
.scn-card .up { color: var(--red); }
.scn-card .un { color: #fbbf24; }

/* Counterfactual card (free-analysis dim 11) */
.cf-card {
  background: rgba(239,68,68,.03);
  border: 1px solid rgba(239,68,68,.12);
  border-left: 4px solid var(--red);
  border-radius: 10px;
  padding: 18px;
  margin: 12px 0;
}
.cf-card h4 { color: #f87171; font-size: 13.5px; margin-bottom: 8px; font-weight: 600; }
.cf-card .if { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 12.5px; color: var(--tx2); }
.cf-card .if b { color: var(--tx); }

/* ═══ CONTENT TEXT — 保持默认色，不强制着色 ═══ */
/* 不再给所有 strong/b 加金色！只有 smartColorize 标记的 span 才着色 */
.card strong, .card b,
.mod-bd strong, .mod-bd b { color: var(--tx); font-weight: 600; }
.bl strong, .bl b { color: #34d399; font-weight: 700; }
.br2 strong, .br2 b { color: #f87171; font-weight: 700; }
.ver strong, .ver b { color: #93b5f7; font-weight: 700; }

/* 涨跌百分比（smartColorize v3 生成的 span）— 红涨绿跌 · 已在 line 510-511 定义，此处不再重复 */

/* 关键数值保持金色：仅限汇总栏 + 仪表盘卡片 */
.sb .val { color: var(--gold); }
.sc .n { text-shadow: 0 0 20px rgba(212,168,83,.15); }

/* Footer */
/* ═══ UNIFIED FOOTER — 数据源 + 触发规则 ═══ */

/* Research keyword tags */
.kw { margin-top: 12px; }
.kw strong { font-size: 12px; color: var(--tx2); margin-right: 8px; }
.kw code {
  background: rgba(212,168,83,.08);
  border: 1px solid rgba(212,168,83,.15);
  padding: 3px 9px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--gold);
  margin-right: 4px;
}
.uf {
  margin-top: 28px;
  padding: 18px 22px;
  background: linear-gradient(135deg, #0c1018, #111827);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
}
.uf-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.uf-src {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.uf-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 10.5px;
  font-weight: 700;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid rgba(212,168,83,.18);
  white-space: nowrap;
}
.uf-info {
  font-size: 10.5px;
  color: var(--tx3);
  line-height: 1.5;
}
.uf-rules {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: rgba(255,255,255,.02);
  border-radius: 8px;
  margin-bottom: 8px;
}
.uf-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
}
.uf-rules code {
  background: var(--card-hi);
  border: 1px solid rgba(255,255,255,.08);
  padding: 3px 9px;
  border-radius: 4px;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 9.5px;
  color: var(--cyan);
  white-space: nowrap;
}

/* Mobile footer */
@media (max-width: 768px) {
  .uf { padding: 12px 14px; margin-top: 18px; }
  .uf-badge { font-size: 9px; padding: 2px 8px; }
  .uf-info { font-size: 9px; }
  .uf-rules { gap: 4px; padding: 8px 10px; }
  .uf-title { font-size: 10px; }
  .uf-rules code { font-size: 8px; padding: 2px 6px; }
  .ft { font-size: 10px; margin-top: 8px; }
}

.ft { text-align: center; font-size: 11px; color: var(--tx3); margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); }
.empty { text-align: center; padding: 120px 20px; color: var(--tx3); }
.empty h3 { font-size: 20px; margin-bottom: 10px; color: var(--tx2); }

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
#pc > * { animation: fadeIn .3s ease; }

/* ═══ SCROLLBAR（暗色主题自定义滚动条）═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }

/* Selection color */
::selection { background: rgba(212,168,83,.25); color: var(--tx); }

/* ══════════════════════════════════════════════════════════════
   MOBILE RESPONSIVE — iPhone 17 Pro Max & all smartphones
   ══════════════════════════════════════════════════════════════ */

/* ── Base: phones (< 768px) ── */
@media (max-width: 768px) {
  body { font-size: 13px; }
  .wrap { padding: 10px 12px 36px; }

  /* ── Banner ── */
  .banner {
    padding: 18px 14px 16px;
    border-radius: 0 0 12px 12px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .brand { font-size: 24px; letter-spacing: 3px; }
  .brand-sub { font-size: 9.5px; letter-spacing: 1px; padding-left: 2px; }
  .bs-icon { font-size: 6px; }
  .bs-sep { margin: 0 3px; }
  .bs-status { font-size: 9px; }

  /* Hide kw-hint on tiny screens to save space */

  /* ── Topbar ── */
  .topbar { flex-wrap: wrap; gap: 10px; margin: 16px 0 12px; }
  .tn { width: 100%; justify-content: center; gap: 2px; padding: 2px; overflow-x: auto; flex-wrap: nowrap; }
  .tn a { padding: 11px 14px; font-size: 12px; min-width: 60px; text-align: center; }
  .tb-right { width: 100%; justify-content: center; gap: 8px; order: -1; }
  .tb-time { font-size: 11px; padding: 5px 10px; }

  /* ── Market tabs ── */
  .mt { grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 14px; }
  .mt-item { padding: 10px 6px 9px; }
  .mt-item .s { font-size: 22px; }
  .mt-item .l { font-size: 10px; }

  /* ── Cards ── */
  .card { padding: 16px 16px; margin-bottom: 12px; border-radius: var(--r-md); overflow-x: auto; }
  .card h2 { font-size: 14px; margin-bottom: 12px; }

  /* ── Dashboard grid ── */
  .dg { grid-template-columns: repeat(2, 1fr); gap: 8px; }

 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>成本</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>98.7 HKD</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>7000股·总投入69.1万HKD</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>现值</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>39.5万HKD</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>56.48×7000</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>浮亏</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>-29.5万·-42.8%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>现金剩余5万HKD</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>回本价</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>98.7 HKD</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>需从56.48涨+75%</td></tr>\n</table>\n\n<!-- 重新推演 -->\n<h3 style='font-size:15px;color:#e8ecf4;margin:20px 0 12px'>监管重拳后的重新推演：V型→N型·150概率从70%降至30%</h3>\n\n<div style='background:rgba(139,92,246,.08);border:1px solid rgba(167,139,250,.18);border-left:4px solid #8b5cf6;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#c4b5fd;font-size:14px'>修正：监管改变了07709的波动结构</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n监管砍掉了三个关键要素：<br>\n① <b>散户增量资金</b>：保证金3倍提升+仅认现金→大量散户被踢出局→买入力量削弱<br>\n② <b>gamma squeeze</b>：20份交易上限→大额交易被限制→杠杆自我强化被打破<br>\n③ <b>新产品供给</b>：暂停新上市→07709的流动性溢价消失<br><br>\n<b>这意味着：之前\"7天翻倍\"的急涨模式很难再现。</b>07709不再是\"急涨急跌\"的工具——会变成\"慢涨慢跌+高磨损\"的普通杠杆ETF。监管直接把它的弹性和投机属性砍掉了一半。<br><br>\n修正后的场景：<br>\n• 急涨到150（概率从70%→<b>30%</b>）：需要ADR再次飙升+韩国放松监管<br>\n• 震荡到100-120（概率从20%→<b>45%</b>）：正股修复到250,000-280,000·磨损吃掉部分涨幅<br>\n• 继续跌或横盘（概率从10%→<b>25%</b>）：监管压力+去杠杆+反垄断调查三重压制\n</span></div>\n\n<!-- 操作建议 -->\n<h3 style='font-size:15px;color:#e8ecf4;margin:20px 0 12px'>诚实的操作建议：分批减仓</h3>\n\n<div style='background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border:left:4px solid #ef4444;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#fca5a5;font-size:14px'>我之前的\"死拿到150\"建议——在监管重拳面前已经失效。修正如下：</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n<b>方案A·分批减仓止损（推荐）：</b><br>\n• 在07709反弹到65-70时，卖出2000-2500股（约30-35%仓位），回收约13-17万HKD<br>\n• 剩余4500-5000股死拿，等监管压力消化后的修复（目标90-110）<br>\n• 5万HKD现金保留不动<br><br>\n<b>方案B·全仓死拿等修复（风险高但可能收益大）：</b><br>\n• 如果正股Q2财报（7月底）超预期+监管暂缓→07709可能回到90-110<br>\n• 但如果监管持续收紧→可能到40以下<br>\n• 概率：90-110约50%·40以下约30%·横盘约20%<br><br>\n<b>方案C·做T降成本（不推荐）：</b><br>\n• 监管环境下的波动率在下降（20份上限=大资金不能T了）<br>\n• 做T的价差缩小·磨损却不变→期望值仍为负<br><br>\n<b>关于小米：21割肉·现在27=+28%的涨幅你错过了。但这个懊悔不应该驱动你现在的决策。小米和07709是两个不同的交易。</b>小米的逻辑是手机+汽车+IOT·07709的逻辑是HBM+杠杆ETF。你现在需要做的是管理07709的风险——不是用小米的遗憾来加倍下注07709。\n</span></div>\n\n<!-- ═══ 第二章：A股 ═══ -->\n<div style='border-left:4px solid #fbbf24;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#fbbf24'>二、A股全貌：半导体-5.63%·科创50-4.02%·资金全面出逃</h2>\n<div style='color:#8896ab;font-size:12px'>neodata: 7标全维度 · 7/16收盘 · 上证-1.85%·创业板-2.95% · 韩国反垄断调查冲击全链</div>\n</div>\n\n<table style='width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px'>\n<tr style='background:rgba(255,255,255,.04)'><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:18%;color:#e8ecf4'>标的</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:14%;color:#e8ecf4'>收盘·涨跌幅</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#e8ecf4'>PE</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:18%;color:#e8ecf4'>主力净流入(7/16)</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#e8ecf4'>5日</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:26%;color:#e8ecf4'>AI研判</th></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>300285 国瓷</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>63.30 -6.76%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>102.32</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>-3.06亿 ❌</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>-21.66%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>昨日+1亿→今日-3亿·主力反手做空·已到64-66目标区·谨慎</td></tr>\n<tr style='background:rgba(239,68,68,.08)'><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#ef4444'>603986 兆易</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>514.61 跌停!</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>-27.4亿 ❌❌</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fca5a5'>跌停+28.7亿净流出·恐慌杀·不补</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#86efac'>002371 北华</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>702.76 -5.37%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>91.46</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>-8.7亿 ❌</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>-20%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>PE三剑客最低·但主力出逃·等680-700</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>002409 雅克</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>约160(-7.6%)</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>连续3日主力出逃·不买</td></tr>\n<tr style='background:rgba(239,68,68,.08)'><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#ef4444'>688008 澜起</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>≈213 -16.4%!</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>-21.7亿 ❌❌</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fca5a5'>韩国检察官突袭·反垄断调查·坚决回避</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>688012 中微</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>约365(-5.7%)</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>-12.6亿 ❌</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>昨日+7908万→今日-12.6亿·全面反转·不买</td></tr>\n</table>\n\n<div style='background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-left:4px solid #ef4444;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#fca5a5;font-size:14px'>⚠ 昨天的\"机构在买\"全面翻转为今天的\"机构在卖\"</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n昨天neodata数据：国瓷+1.09亿·兆易+1832万·北华+2374万·中微+7908万——全是净流入。<br>\n今天neodata数据：国瓷-3.06亿·兆易-27.4亿·北华-8.7亿·中微-12.6亿——<b>全部翻转为净流出。</b><br><br>\n这不是\"高低切换\"——是<b>全面恐慌性出逃</b>。韩国反垄断调查+韩国监管重拳杠杆ETF+韩国加息+油价上涨+台积电法说……多重利空在同一天砸下来。机构昨天买的今天全卖了。<br><br>\n<b>结论：今天不买任何A股。等恐慌消化。</b>\n</span></div>\n\n<!-- ═══ 第三章：WAIC+长鑫+大事件 ═══ -->\n<div style='border-left:4px solid #3b82f6;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#93c5fd'>三、近期大事件全景</h2>\n<div style='color:#8896ab;font-size:12px'>WAIC·长鑫IPO·韩国反垄断·监管新规·台积电法说·油价</div>\n</div>\n\n<div style='background:rgba(139,92,246,.08);border:1px solid rgba(167,139,250,.18);border-left:4px solid #8b5cf6;border-radius:8px;padding:14px 18px;margin-bottom:12px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#c4b5fd;font-size:14px'>WAIC 2026世界人工智能大会（7月初·已结束）</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n对半导体板块的催化已消化。WAIC上AI芯片/大模型/端侧AI的热度对存储/算力有正面预期，但这个利好已在6月底-7月初的暴涨中充分定价。现在市场在消化\"AI投资是否可持续\"的担忧——IBM警告客户正从软件转向存储芯片投资（利好存储但利空整体科技支出）。\n</span></div>\n\n<div style='background:rgba(139,92,246,.08);border:1px solid rgba(167,139,250,.18);border-left:4px solid #8b5cf6;border-radius:8px;padding:14px 18px;margin-bottom:12px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#c4b5fd;font-size:14px'>长鑫科技IPO（7/16申购→7/25-30挂牌）</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n今天申购日。打新资金抽离效应今天充分体现（半导体-5.63%）。申购完成后7/17-7/18部分资金回流。但真正的\"利好出尽\"回调要等月底挂牌日。兆易与长鑫的57亿关联交易是长期催化剂——但短期被恐慌情绪完全淹没。长鑫正式挂牌后存储产业链关注度将回升。\n</span></div>\n\n<div style='background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-left:4px solid #ef4444;border-radius:8px;padding:14px 18px;margin-bottom:12px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#fca5a5;font-size:14px'>韩国反垄断调查（7/15突袭→持续发酵中）</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n韩国检察官突袭澜起科技/瑞萨/Rambus韩国办事处，怀疑操纵供应三星/SK海力士/美光的半导体元件价格。澜起今日-16.4%。<b>这个事件如果扩大——可能涉及更多A股半导体公司。</b>目前只有澜起确认被调查，但这个不确定性会持续压制板块。\n</span></div>\n\n<div style='background:rgba(239,68,6 px solid rgba(167,139,250,.18);border-left:4px solid #8b5cf6;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#c4b5fd;font-size:14px'>三种方案的结论</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n什么都不做 = 概率加权+9.2万，但在U型路径下亏损-8.4万。<br>\n9万全买@60 = 概率加权+17.9万，所有路径都优于什么都不做。<br>\n<b>先买4.5万+留4.5万等低位 = 概率加权+19-22万，最优。但前提是回踩发生（概率65%）。</b>\n</span></div>\n\n<!-- ═══ 第四章：明天三场景 ═══ -->\n<div style='border-left:4px solid #22c55e;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#86efac'>四、明天（7/14）三场景操作手册</h2>\n<div style='color:#8896ab;font-size:12px'>基于ADR实时数据（$152.58，-9.18%，盘中低点$151.30）</div>\n</div>\n\n<table style='width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px'>\n<tr style='background:rgba(34,197,94,.1)'><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#86efac'>场景</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#86efac'>概率</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#86efac'>正股开盘</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#86efac'>07709开盘</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:26%;color:#86efac'>驱动因素</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:26%;color:#86efac'>你的操作</th></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#86efac'>场景A<br>低开反弹</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>50%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>178,000-188,000</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>55-60</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>开盘消化ADR-9%·HBM4出货消息+CEO表态推反弹·CPI前市场谨慎</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'><b>开盘买入4.5万HKD（~800股）</b><br>如果盘中跌到52-55→剩余4.5万全买<br>如果反弹到62-65→不追·留子弹</td></tr>\n<tr style='background:rgba(239,68,68,.08)'><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#ef4444'>场景B<br>继续下杀</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>20%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>168,000-175,000</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>48-54</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>ADR跌破$149·IPO铁底失守·伊朗升级·融资盘继续踩踏</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'><b>9万全部买入</b>（若低于50）<br>极端恐慌=历史机会<br>前提：HBM4出货+CEO表态未证伪</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#fbbf24'>场景C<br>高开不回调</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>30%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>190,000-200,000</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>62-68</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>ADR溢价逆流修复·HBM4消息被充分消化·抄底资金涌入</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'><b>不追高。等。</b><br>CPI/ASML/加息三者至少有一件会制造回踩<br>保留全部9万等7/15-7/16</td></tr>\n</table>\n\n<!-- ═══ 第五章：后市的台阶 ═══ -->\n<div style='border-left:4px solid #8b5cf6;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#c4b5fd'>五、修复台阶：你的两个关键心理关口</h2>\n<div style='color:#8896ab;font-size:12px'>不要盯着150——先看95（回本）再看120（盈利）。分两步走。</div>\n</div>\n\n<div style='background:rgba(139,92,246,.08);border:1px solid rgba(167,139,250,.18);border-left:4px solid #8b5cf6;border-radius:8px;padding:14px 18px;margin-bottom:12px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#c4b5fd;font-size:14px'>第一台阶：95 HKD · 回本线（概率70%·4-8周）</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n9万全买后成本95。07709从60到95=+58%。正股需从184,500到约240,000-260,000（+30-41%）。这个幅度在\"N型慢涨\"路径下可实现。<br>\n<b>达到95后不要急于卖。</b>回本不是目的——只是让你心理上好受一点。真正的收益在120+。\n</span></div>\n\n<div style='background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.18);border-left:4px solid #22c55e;border-radius:8px;padding:14px 18px;margin-bottom:12px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#86efac;font-size:14px'>第二台阶：120 HKD · 减仓信号（概率55%·6-12周）</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n到120意味着正股约280,000-300,000 KRW（接近前高）。此时：<br>\n① <b>如果正股是V型急涨过来的</b>→磨损小·趋势强→继续持有等150<br>\n② <b>如果正股是N型慢涨过来的</b>→磨损已吃掉大半→<b>在120减仓30%</b>·回收约28万HKD·锁定利润\n</span></div>\n\n<div style='background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18);border-left:4px solid #f59e0b;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#fbbf24;font-size:14px'>第三台阶：150 HKD · 只发生在V型（概率30%·4-8周）</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n到150需要正股约320,000-350,000 KRW，且路径是快速V型（磨损较小）。如果正股是慢涨→U型，150大概率到不了。<b>到150时减仓50%锁定利润。</b>如果正股是V型但速度放缓，在130-140减仓即可。\n</span></div>\n\n<!-- ═══ 第六章：不想做T的最终方案 ═══ -->\n<div style='border-left:4px solid #22c55e;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#86efac'>六、最终方案：All-in 但不追高</h2>\n<div style='color:#8896ab;font-size:12px'>接受磨损是客观规律·最优策略是在可接受价格把子弹打完·然后不动</div>\n</div>\n\n<table style='width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px'>\n<tr style='background:rgba(34,197,94,.1)'><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:16%;color:#86efac'>时间</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:10%;color:#86efac'>操作</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:10%;color:#86efac'>07709价</th><th style='text- a;color:#b4bcc8'>7,870-7,970</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>93.0-94.1</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>CPI+ASML+加息=回踩窗口</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#fbbf24'>明早开48-54</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>全买9万</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>48-54</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>9万</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>7,970-8,180</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>90.7-93.0</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>极端恐慌=送钱</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>7/17-7/18 加息后</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>持有</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>65-72</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>7,800+</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>91-94</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>利空出尽反弹</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>8/15前后</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>评估</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>100-120?</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>—</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>7,800+</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>91-94</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>达到120减仓30%<br>未达100则死拿</td></tr>\n</table>\n\n<!-- ═══ 第七章：为什么不做T ═══ -->\n<div style='border-left:4px solid #ef4444;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#fca5a5'>七、为什么不做T——磨损铁律对交易者的残酷现实</h2>\n<div style='color:#8896ab;font-size:12px'>这和你不会做T无关——是数学上T的期望值为负</div>\n</div>\n\n<div style='background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);border-left:4px solid #ef4444;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n<b>07309的磨损公式决定了做T的期望值为负：</b><br>\n① 你在下跌时（跟踪几乎100%准确）卖出一部分——亏得干净利落<br>\n② 你在上涨时（跟踪落后25个基点）买回来——比理论少拿25基点<br>\n③ 做T的综合数学：卖在下跌段（全额亏损）+ 买在上涨段（被磨损扣25基点）= <b>每轮T的期望损失约1.8-2.2%</b><br><br>\n杠杆ETF的设计决定了：<b>更适合持仓不动，等待单边行情带来的复利放大。</b>在单边上涨中，复利会帮你赚超2倍的钱（参照618行情100→193仅7天）。在震荡中，做T只是在帮你亏得更快。<br><br>\n\n你的-45%浮亏创痛，不是因为你做错了什么——是杠杆ETF在震荡市中<strong style='color:#fca5a5'>本来就该亏这么多</strong>。这不是错误交易，是工具特性。\n</span></div>\n\n<!-- ═══ 第八章：券商目标价参考 ═══ -->\n<div style='border-left:4px solid #3b82f6;padding-left:16px;margin:28px 0 20px'>\n<h2 style='margin:0 0 4px;font-size:17px;color:#93c5fd'>八、8家券商目标价：全部严重看多·我不会被带偏</h2>\n<div style='color:#8896ab;font-size:12px'>来源：BigGo/KB/NH/韩华/里昂/瑞银/花旗/KIS·2026年7月最新</div>\n</div>\n\n<table style='width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px'>\n<tr style='background:rgba(34,197,94,.1)'><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:18%;color:#86efac'>券商</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:18%;color:#86efac'>目标价(万KRW)</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:12%;color:#86efac'>涨幅</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:14%;color:#86efac'>隐含07709</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:10%;color:#86efac'>评级</th><th style='text-align:left;padding:8px 12px;border:1px solid #2a2d3a;width:28%;color:#86efac'>AI评判</th></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>韩华投资</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>430</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>+133%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>250-300</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>买入</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>最乐观·可能过度</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>KB证券</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>420</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>+128%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>240-290</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>买入</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>ADR溢价修复逻辑</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>NH投资</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac;font-weight:700'>410</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>+122%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>230-280</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#86efac'>买入</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>2027营业利益470兆</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>KIS</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>380</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>+106%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>200-250</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>增持</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>触发今天暴跌的报告·但维持目标</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>里昂</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>370</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>+101%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>190-240</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>强推</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>PE仅5倍·估值重评持续</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>瑞银</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>320</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>+73%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>160-200</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>买入</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>2026 OP 32.7兆·超共识27%</td></tr>\n<tr><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#e8ecf4'>花旗</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24;font-weight:700'>310</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>+68%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>150-190</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fbbf24'>买入</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#8896ab'>Q4 HBM ASP +30% QoQ</td></tr>\n<tr style='background:rgba(239,68,68,.08)'><td style='padding:8px 12px;border:1px solid #2a2d3a;font-weight:600;color:#ef4444'>BNK投资</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444;font-weight:700'>185</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>+0%</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#b4bcc8'>55-65</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#ef4444'>持有</td><td style='padding:8px 12px;border:1px solid #2a2d3a;color:#fca5a5'>唯一看空·目标=现价</td></tr>\n</table>\n\n<div style='background:rgba(139,92,246,.08);border:1px solid rgba(167,139,250,.18);border-left:4px solid #8b5cf6;border-radius:8px;padding:14px 18px;margin-bottom:16px;color:#b4bcc8;font-size:13px;line-height:1.85'>\n<strong style='color:#c4b5fd;font-size:14px'>AI独立裁决</strong><br>\n<span style='color:#d1d5db;font-size:13px;line-height:1.85'>\n8家券商平均目标378万韩元（+105%）。扣除BNK最保守值，7家平均410万（+122%）。<br>\n<b>⚠ 但我不会直接用这个目标价：</b><br>\n① 券商目标价是12个月，不是4-8周<br>\n② 券商不考虑07709的磨损效应——对杠杆ETF持有者来说，正股到目标价≠ETF翻倍<br>\n③ 取<b>最保守可实现的320万（瑞银+花旗中间值）= 正股+70%</b><br>\n④ 在N型慢涨路径下：正股+70% → 07709+80-100% → 约108-120 HKD<br>\n<b>⑤ 对95成本的你：到108-120 = 盈利14-26%。这是更现实的目标。</b>\n</span></div>\n\n<!-- ═══ 第九章：最终裁决 ═══ -->\n<div class='card' style='background:linear-gradient(135deg,#1a1a2e,#0f172a);color:#fff;border:1px solid #2a2d3a'>\n<h3 style='font-size:18px;font-weight:700;margin:0 0 14px;color:#fbbf24'>AI最终裁决</h3>\n<div style='font-size:13px;line-height:1.9;color:#d1d5db'>\n\n<b>你的恐惧是理性的——但不需要变成行动。</b><br>\n-45%的浮亏在2倍杠杆ETF上是正常现象（不是你的错，是工具特性）。彭博BI的数据证明了这一点。<br><br>\n\n<b>最务实的方案：分两笔（4.5+4.5万），在58以下建仓完。</b><br>\n如果明天开55-60→先买4.5万。如果7/15-7/16回踩52-55→补4.5万。<br>\n如果明天就开48-54→全买9万（送钱）。<br>\n如果明天开63以上→不追·等CPI/ASML/加息制造的回踩。<br><br>\n\n<b>不要做T。</b> 07709的磨损公式决定了做T的期望值为负（卖在跟踪100%准的下跌、买在跟踪落后25基点的上涨→每轮损失1.8-2.2%）。这不是\"你会不会T\"的问题——是数学。<br><br>\n\n<b>调整你的心理预期：95回本→120减仓→150是彩票。</b><br>\n券商目标价320-430万（+70-133%），但正股到目标价≠07709翻倍。磨损吃掉了中间的差距。取现实目标：正股320万→07709约120→你+26%。这个目标是合理的、可实现的。<br><br>\n\n<b>退出条件：</b>正股跌破140,000 KRW（再跌24%）+ HBM4出货被证伪。否则死拿。<br>\n<b>减仓纪律：</b>07709到120减仓30%（回收约28万HKD），到150减仓50%。<br>\n<b>最大错误是今天恐慌离场。</b> -45%的浮亏在杠杆ETF持有者中是常态。从59.9到95只需要正股涨30%+07709路径是急涨（34-44%概率）。等待比恐慌更有价值。\n\n</div></div>\n\n<div style='font-size:11px;color:#9ca3af;text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #2a2d3a'>\n⚡ 以上为AI独立研判 · 不构成投资建议 · 数据截至2026-07-13 23:55 · ADR $152.58(-9.18%)盘中<br>\n数据源：Bloomberg BI · 8家券商研报 · neodata · WebSearch · TDX MCP · Westock-data\n</div></div>"
};

<script>
// v5 daily — beautiful financial dashboard
function renderDaily(data, panel) {
  if (!data || !data.scores) { panel.innerHTML = '<div class="empty"><h3>暂无日报</h3><p>运行「生成日报」获取最新数据</p></div>'; return; }

  var h = '', sc = data.scores;

  // ═══ Macro ═══
  if (sc.macro) {
    var m = sc.macro;
    var bg = m.score < 60 ? 'var(--red)' : m.score < 75 ? 'var(--amber)' : '#22c55e';
    h += '<div class="card"><div class="sc-row">';
    h += '<div class="sc" style="background:'+bg+'"><span class="n">'+m.score+'</span><span class="l">'+(m.score<60?'谨慎':m.score<75?'中性':'积极')+'</span></div>';
    h += '<div class="sc-info"><div class="h">宏观综合判断</div><div class="d">'+(m.note||'')+'</div></div></div>';
    (data.macro_indicators||[]).forEach(function(x){
      var c = x.s < 40 ? 'var(--red)' : x.s < 60 ? 'var(--amber)' : '#22c55e';
      h += '<div class="brw"><span class="br-n">'+x.n+'</span><span class="br-av">'+(x.av||'--')+'</span><span class="br-t"><span class="br-f" style="width:'+x.s+'%;background:'+c+'"></span></span><span class="br-v">'+x.s+'</span><span class="br-d">'+x.d+'</span></div>';
    });
    if (data.macro_events) {
      h += '<div style="margin-top:10px">';
      data.macro_events.forEach(function(e){ h += '<div class="ev"><span class="et '+(e.cls||'em')+'">'+(e.tag||'')+'</span><span class="ev-t">'+e.title+'</span><div class="ev-b">'+e.body+'</div></div>'; });
      h += '</div>';
    }
    h += '</div>';
  }

  // ═══ Market Tabs ═══
  var mks = [
    {k:'us_stocks',l:'US 美股',c:'mt-us',e:'us'},
    {k:'hk_stocks',l:'HK 港股',c:'mt-hk',e:'hk'},
    {k:'korea',l:'KR 韩国',c:'mt-kr',e:'kr'},
    {k:'a_stocks',l:'CN A股',c:'mt-cn',e:'cn'}
  ];
  h += '<div class="mt">';
  mks.forEach(function(m){ h += '<div class="mt-item '+m.c+'" id="mt-'+m.k+'" onclick="showMkt(\''+m.k+'\')"><span class="s">'+(sc[m.k]?sc[m.k].score:'--')+'</span><span class="l">'+m.l+'</span></div>'; });
  h += '</div>';
  mks.forEach(function(m, i){
    var s = sc[m.k]; if (!s) return;
    var w = s.score<40?'偏弱':s.score<60?'中性':s.score<80?'偏强':'强势';
    var isFirst = !h.match(/id="mp-/);  // 第一个实际渲染的面板不隐藏
    h += '<div class="card" id="mp-'+m.k+'"'+(isFirst?'':' style="display:none"')+'>';
    h += '<div class="sc-row"><div class="mc" style="background:'+(m.k==='us_stocks'?'linear-gradient(135deg,#3b82f6,#06b6d4)':m.k==='hk_stocks'?'linear-gradient(135deg,#f97316,#ef4444)':m.k==='korea'?'linear-gradient(135deg,#8b5cf6,#ec4899)':'linear-gradient(135deg,#6366f1,#3b82f6)')+'"><span class="n">'+s.score+'</span><span class="l">'+w+'</span></div>';
    h += '<div class="sc-info"><div class="h">'+s.note+'</div><div class="d">'+(s.desc||'')+'</div></div></div>';
    var mi = data.market_indicators && data.market_indicators[m.k];
    if (mi) { mi.forEach(function(r){ h += '<div class="mr"><span class="mr-n">'+r.name+'</span><span class="mr-av">'+(r.av||'--')+'</span><span class="mr-v">'+r.val+'</span><span class="mr-d">'+r.desc+'</span></div>'; }); }
    var me = data.market_events && data.market_events[m.k];
    if (me) { me.forEach(function(e){ h += '<div class="ev"><span class="et '+(e.cls||'')+'">'+(e.tag||'')+'</span><span class="ev-t">'+e.title+'</span><div class="ev-b">'+e.body+'</div></div>'; }); }
    h += '<div class="sb"><span class="lbl">综合评分</span><span class="val" style="color:'+(s.score<50?'var(--red)':s.score<70?'var(--amber)':'var(--green)')+'">'+s.score+'</span><span class="lbl">'+(s.summary||'')+'</span></div></div>';
  });

  // ═══ Holdings ═══
  if (data.holdings) {
    var st = [];
    if (data.holdings.a_stocks) st = st.concat(data.holdings.a_stocks.map(function(s){ s.mkt='RMB'; return s; }));
    if (data.holdings.hk_stocks) st = st.concat(data.holdings.hk_stocks.map(function(s){ s.mkt='HKD'; return s; }));
    if (data.holdings.funds) st = st.concat(data.holdings.funds.map(function(s){ s.mkt='RMB'; s.isF=true; return s; }));
    h += '<div class="card"><h2>持仓全景</h2><table><colgroup><col style="width:150px"/><col style="width:100px"/><col style="width:65px"/><col style="width:65px"/><col style="width:85px"/><col style="width:60px"/></colgroup><tr><th>标的</th><th>持仓</th><th>成本</th><th>现价</th><th>盈亏</th><th>渠道</th></tr>';
    st.forEach(function(s){
      var c = 'var(--green)'; // 默认绿色（亏损）
      // 处理 pnl_pct：可能是纯数字或含文本的混合格式
      var pctVal = s.pnl_pct;
      var pctDisplay = '';
      if (pctVal == null) { pctDisplay = '--'; }
      else if (typeof pctVal === 'number') {
        c = pctVal >= 0 ? 'var(--red)' : 'var(--green)';
        pctDisplay = (pctVal >= 0 ? '+' : '') + pctVal + '%';
      } else {
        // 字符串格式：含%的混合文本（如 "近1月约-5%"）
        // 正则必须匹配到%号，否则会错误匹配到文本中的其他数字（如"近1月"中的1）
        var numMatch = String(pctVal).match(/([+-]?\d+(?:\.\d+)?)%/);
        if (numMatch) {
          var n = parseFloat(numMatch[1]);
          c = (!isNaN(n) && n >= 0) ? 'var(--red)' : 'var(--green)';
        }
        pctDisplay = pctVal; // 原样显示，不追加%
      }
      var t = s.mkt==='HKD'?'<span class="thkd">HKD</span>':'<span class="trmb">RMB</span>';
      h += '<tr><td>'+t+' <strong>'+(s.code||'')+'</strong> '+(s.name||'')+'</td><td>'+s.shares+(s.isF?'':'股')+'</td><td>'+(s.cost||'--')+'</td><td>'+(s.current||'--')+'</td><td style="color:'+c+';font-weight:600">'+pctDisplay+'</td><td>'+(s.channel||'')+'</td></tr>';
    });
    h += '</table>';
    if (data.holdings_summary) h += '<div class="nt" style="margin-top:10px">'+data.holdings_summary+'</div>';
    h += '</div>';
  }

  // ═══ Triggers ═══
  if (data.triggers) {
    h += '<div class="card"><h2>触发矩阵</h2><table><colgroup><col/><col/><col/><col/><col/></colgroup><tr><th>标的</th><th>触发条件</th><th>现价</th><th>距离</th><th>操作</th></tr>';
    data.triggers.forEach(function(t){
      var cls = Math.abs(t.distance_pct)<5?'br':Math.abs(t.distance_pct)<10?'ba':'bb';
      h += '<tr><td><strong>'+(t.code||'')+'</strong> '+(t.name||'')+'</td><td>'+t.condition+'</td><td>'+t.current+'</td><td><span class="bad '+cls+'">'+t.distance_label+'</span></td><td>'+t.action+'</td></tr>';
    });
    h += '</table>';
    if (data.trigger_alert) h += '<div class="al" style="margin-top:10px">'+data.trigger_alert+'</div>';
    h += '</div>';
  }

  // ═══ AI Analysis ═══
  if (data.ai_analysis && data.ai_analysis.length) {
    h += '<div class="card"><h2>AI 独立研判</h2><div class="ai">';
    data.ai_analysis.forEach(function(x){
      var ct = x.confidence==='high'?'bg':x.confidence==='medium'?'ba':'br';
      h += '<div style="margin-bottom:14px"><strong>'+x.angle+'</strong> <span class="bad '+ct+'">'+x.confidence+'</span><br>'+x.judgment;
      if (x.action) h += '<br><strong>→ '+x.action+'</strong>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // ═══ Stock Analysis ═══
  if (data.stock_analysis) {
    var sa = data.stock_analysis;
    h += '<div class="dv"><span>可配置标的</span></div>';
    if (sa.core) {
      h += '<div class="card"><h2>核心配置</h2><table><colgroup><col style="width:22%"/><col style="width:14%"/><col style="width:18%"/><col style="width:16%"/><col/></colgroup><tr><th>标的</th><th>现价</th><th>持仓</th><th>触发</th><th>逻辑</th></tr>';
      sa.core.forEach(function(c){ h += '<tr><td><strong>'+c.code+'</strong> '+c.name+'</td><td>'+c.price+'</td><td>'+c.position+'</td><td>'+c.trigger+'</td><td>'+c.logic+'</td></tr>'; });
      h += '</table></div>';
    }
    if (sa.monitor_layers) {
      h += '<div class="card"><h2>持续监控 · 产业链分层</h2>';
      sa.monitor_layers.forEach(function(l){
        h += '<div class="sl"><div class="sl-hd" style="background:'+(l.color||'linear-gradient(90deg,#8b5cf6,#a78bfa)')+'">'+l.name+'</div>';
        h += '<table class="sl-tbl"><colgroup><col style="width:24%"/><col style="width:14%"/><col style="width:16%"/><col style="width:16%"/><col/></colgroup><tr><th>标的</th><th>细分</th><th>现价</th><th>入场</th><th>逻辑</th></tr>';
        l.stocks.forEach(function(s){ h += '<tr><td><strong>'+s.code+'</strong> '+s.name+'</td><td>'+s.sub+'</td><td>'+s.price+'</td><td>'+s.entry+'</td><td>'+s.logic+'</td></tr>'; });
        h += '</table></div>';
      });
      h += '</div>';
    }
  }

  // ═══ Execution Plan ═══
  if (data.execution_plan) {
    var ep = data.execution_plan;
    h += '<div class="dv"><span>执行计划</span></div>';
    h += '<div class="card"><h2>Phase 状态</h2><div style="font-size:13px;line-height:2.2">';
    (ep.phases||[]).forEach(function(p){ h += '<span class="pt '+p.cls+'">'+p.name+'</span> '+p.status+' · '+p.desc+'<br>'; });
    h += '</div>';
    if (ep.firepower) h += '<div class="nt" style="margin-top:10px">'+ep.firepower+'</div>';
    h += '</div>';
    if (ep.panels) {
      h += '<div class="card"><h2>操作建议</h2>';
      ep.panels.forEach(function(p){ h += '<div class="pn pn-'+(p.cls||'b')+'"><strong style="color:'+(p.title_color||'')+'">'+(p.title||'')+'</strong><br>'+(p.content||'')+'</div>'; });
      h += '</div>';
    }
  }

  panel.innerHTML = h;
}

function showMkt(k) {
  ['us_stocks','hk_stocks','korea','a_stocks'].forEach(function(x,i){
    var t = document.getElementById('mt-'+x), p = document.getElementById('mp-'+x);
    if (!t||!p) return;
    p.style.display = (x===k)?'':'none';
  });
  var cls = {'us_stocks':'mt-us','hk_stocks':'mt-hk','korea':'mt-kr','a_stocks':'mt-cn'};
  document.querySelectorAll('.mt-item').forEach(function(t){ t.className = 'mt-item '+(cls[t.id.replace('mt-','')]||''); });
  var sel = document.getElementById('mt-'+k);
  if (sel) sel.classList.add('act');
}

<script>
// v5 research renderer
function renderResearch(data, panel) {
  if (!data) { panel.innerHTML = '<div class="empty"><h3>暂无研报</h3><p>运行「生成研报」获取最新报告</p></div>'; return; }
  var h = '';
  h += '<div class="card-dark"><h2>AI产业链深度研报</h2><div class="sub">'+(data.title||'')+' · 数据截至'+(data.date||'')+'</div></div>';

  // M1
  if (data.module1) {
    h += '<div class="mod"><div class="mod-hd">AI产业链景气仪表</div><div class="mod-bd">';
    if (data.module1.rows) {
      h += '<table><colgroup><col/><col/><col/><col/></colgroup><tr><th>层级</th><th>环节</th><th>信号</th><th>核心变化</th></tr>';
      data.module1.rows.forEach(function(r){
        var sig = r.signal==='green'?'<span class="sg sg2"></span><span class="tg tg-g">强劲</span>':r.signal==='yellow'?'<span class="sg sy"></span><span class="tg tg-y">偏强</span>':'<span class="sg sr"></span><span class="tg tg-r">偏弱</span>';
        h += '<tr><td>'+r.layer+'</td><td>'+r.segment+'</td><td>'+sig+'</td><td>'+r.detail+'</td></tr>';
      });
      h += '</table>';
    }
    if (data.module1.ai_judgment) h += '<div class="ai" style="margin-top:12px"><strong>AI判断</strong><br>'+data.module1.ai_judgment+'</div>';
    h += '</div></div>';
  }

  // M2
  if (data.module2) {
    h += '<div class="mod"><div class="mod-hd">上游深度分析</div><div class="mod-bd">';
    ['materials','equipment'].forEach(function(k){
      var sec = data.module2[k]; if (!sec) return;
      h += '<div class="sec"><div class="sec-ttl">'+(k==='materials'?'半导体材料':'芯片设备')+'</div>';
      if (sec.table) {
        h += '<table><colgroup><col/><col/><col/><col/><col/></colgroup><tr><th>细分</th><th>标的</th><th>现价</th><th>周涨跌</th><th>动态</th></tr>';
        sec.table.forEach(function(r){
          var chg = r.change>=0?'<span class="up">+'+r.change+'%</span>':'<span class="dn">'+r.change+'%</span>';
          h += '<tr><td>'+r.sub+'</td><td><strong>'+r.code+'</strong> '+r.name+'</td><td>'+r.price+'</td><td>'+chg+'</td><td>'+r.detail+'</td></tr>';
        });
        h += '</table>';
      }
      if (sec.ai_judgment) h += '<div class="ai" style="margin-top:10px"><strong>AI判断</strong><br>'+sec.ai_judgment+'</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }

  // M3
  if (data.module3 && data.module3.sections) {
    h += '<div class="mod"><div class="mod-hd">中游核心层 (MLCC / HBM / 光模块)</div><div class="mod-bd">';
    data.module3.sections.forEach(function(sec){
      h += '<div class="sec"><div class="sec-ttl">'+sec.title+'</div>';
      if (sec.text) h += '<p style="font-size:13px;line-height:1.8;margin-bottom:10px">'+sec.text+'</p>';
      if (sec.dashboard) {
        h += '<div class="dg">';
        sec.dashboard.forEach(function(d){ h += '<div class="dc"><div class="v" style="color:'+(d.color||'#ef4444')+'">'+d.value+'</div><div class="l">'+d.label+'</div><div class="s">'+d.sub+'</div></div>'; });
        h += '</div>';
      }
      if (sec.table) {
        var cg = '';
        sec.table.headers.forEach(function(){ cg += '<col/>'; });
        h += '<table><colgroup>'+cg+'</colgroup><tr>'; sec.table.headers.forEach(function(th, idx){ h += '<th>'+th+'</th>'; }); h += '</tr>';
        sec.table.rows.forEach(function(r){ h += '<tr>'; r.forEach(function(c){ h += '<td>'+c+'</td>'; }); h += '</tr>'; });
        h += '</table>';
      }
      h += '</div>';
    });
    h += '</div></div>';
  }

  // M4-5 — 兼容新旧两种格式
  [4,5].forEach(function(n){
    var mod = data['module'+n]; if (!mod) return;
    h += '<div class="mod"><div class="mod-hd">'+(n===4?'中游封装/PCB':'下游AI应用')+'</div><div class="mod-bd">';
    var sections = mod.sections;
    if (sections && sections.length) {
      sections.forEach(function(sec){
        h += '<div class="sec"><div class="sec-ttl">'+sec.title+'</div>';
        if (sec.table) {
          var cg = '';
          sec.table.headers.forEach(function(){ cg += '<col/>'; });
          h += '<table><colgroup>'+cg+'</colgroup><tr>'; sec.table.headers.forEach(function(th, idx){ h += '<th>'+th+'</th>'; }); h += '</tr>';
          sec.table.rows.forEach(function(r){ h += '<tr>'; r.forEach(function(c){ h += '<td>'+c+'</td>'; }); h += '</tr>'; });
          h += '</table>';
        }
        if (sec.text) h += '<p style="font-size:13px;line-height:1.8;color:var(--tx-body)">'+sec.text+'</p>';
        if (sec.ai_judgment) h += '<div class="ai" style="margin-top:10px"><strong>AI判断</strong><br>'+sec.ai_judgment+'</div>';
        h += '</div>';
      });
    } else {
      // 旧格式：直接遍历已知子对象（server / cloud / materials / equipment）
      ['server','cloud','materials','equipment'].forEach(function(subKey){
        if (!mod[subKey]) return;
        var sub = mod[subKey];
        if (typeof sub !== 'object' || sub === null) return;
        Object.keys(sub).forEach(function(k){
          if (k === 'subtitle') {
            h += '<div class="sec"><div class="sec-ttl">'+sub[k]+'</div></div>';
          } else if (k.indexOf('ai_judgment') === 0) {
            h += '<div class="ai" style="margin-top:10px"><strong>AI判断</strong><br>'+sub[k]+'</div>';
          } else if (typeof sub[k] === 'string') {
            h += '<p style="font-size:13px;line-height:1.8;margin-bottom:10px;color:var(--tx-body)"><strong>'+k+'</strong><br>'+sub[k]+'</p>';
          }
        });
      });
    }
    h += '</div></div>';
  });

  // M6
  if (data.module6 && (data.module6.review || data.module6.thresholds)) {
    h += '<div class="mod"><div class="mod-hd">标的审查 + 阈值重算</div><div class="mod-bd">';
    if (data.module6.review) {
      h += '<div class="sec"><div class="sec-ttl">持仓审查</div><table><colgroup><col/><col/><col/><col/></colgroup><tr><th>标的</th><th>成本/现价</th><th>浮亏</th><th>评估</th></tr>';
      data.module6.review.forEach(function(r){
        var pnlColor = (r.pnl != null && r.pnl >= 0) ? 'var(--red)' : (r.pnl != null ? 'var(--green)' : '');
        h += '<tr><td><strong>'+r.code+'</strong> '+r.name+'</td><td>'+r.cost+'/'+r.current+'</td><td style="color:'+pnlColor+'">'+(r.pnl!=null?(r.pnl>=0?'+':'')+r.pnl+'%':'--')+'</td><td><span class="bad '+(r.tag_class||'bg')+'">'+r.tag+'</span> '+r.note+'</td></tr>';
      });
      h += '</table></div>';
    }
    if (data.module6.thresholds) {
      h += '<div class="sec"><div class="sec-ttl">阈值重算</div><table><colgroup><col/><col/><col/></colgroup><tr><th>标的</th><th>新阈值</th><th>理由</th></tr>';
      data.module6.thresholds.forEach(function(t){ h += '<tr><td><strong>'+t.code+'</strong></td><td>'+t.new_threshold+'</td><td>'+t.reason+'</td></tr>'; });
      h += '</table></div>';
    }
    h += '</div></div>';
  }

  // M7
  if (data.module7 && data.module7.events) {
    h += '<div class="mod"><div class="mod-hd">催化剂日历'+(data.module7.subtitle||'')+'</div><div class="mod-bd">';
    data.module7.events.forEach(function(e){ 
      var impactLabel = e.impact ? '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-right:6px;'+(e.impact==='critical'?'background:rgba(231,76,60,.2);color:#e74c3c':e.impact==='high'?'background:rgba(243,156,18,.2);color:#f39c12':'background:rgba(149,165,166,.2);color:#95a5a6')+'">'+e.impact+'</span>' : '';
      h += '<div class="cl"><div class="cl-d">'+e.date+'</div><div class="cl-b"><strong>'+e.event+'</strong>'+impactLabel+'<br><span style="color:var(--tx2);font-size:12px;line-height:1.6">'+(e.detail||e.impact||'')+'</span></div></div>'; 
    });
    h += '</div></div>';
  }

  panel.innerHTML = h;
}

<script>
// deep-dive.js — v8 自由格式·AI自主决定输出逻辑框架和外观样式
// 数据格式: { content: "完整HTML" } → 直接渲染
// 兼容旧格式: { sections: [...] } → 降级为simple-text渲染

// ═══ 颜色合规自动修复 — 防止AI自由输出时出现黄底紫字等不可读配色 ═══
// WCAG AA 标准: 浅色背景必须用深色文字 (对比度≥4.5:1)
function ddSanitizeColors(html) {
  if (!html) return html;

  // 浅色背景 + 边框 替换为带左边色条 + 深色文字的卡片
  // 黄色系 (背景 #fef3c7/#fef9e7 + 边框 #fbbf24/#f59e0b) → 加深色边+深色字
  html = html.replace(
    /background:\s*#fef3c7|background:\s*#fef9e7|background:\s*#fef9c3|background:\s*#fde68a|background:\s*#fffbeb/gi,
    'background:#fffbeb'
  );
  // 紫色块 (背景 #ede9fe) → 浅紫
  html = html.replace(/background:\s*#ede9fe/gi, 'background:#f5f3ff');
  // 红色警示块 (#fef2f2)
  html = html.replace(/background:\s*#fef2f2/gi, 'background:#fef2f2');

  // 修复黄色背景上用浅色字 (4c1d95/5b21b6/6d28d9 等紫色字) 的不可读组合
  // 检测到 #fffbeb/#fef3c7 背景时强制使用深棕/深红文字
  // 这个正则匹配背景为黄色系的div
  html = html.replace(
    /(background:\s*#fffbeb[^}]*?)color:\s*#?[0-9a-f]{3,6}/gi,
    function(match, prefix) {
      // 如果已有color:浅色则改为深色
      return prefix + 'color:#451a03';
    }
  );

  // 修复红色背景上用白色/浅色字
  html = html.replace(
    /(background:\s*#fef2f2[^}]*?)color:\s*#fff/gi,
    '$1color:#7f1d1d'
  );

  return html;
}

function renderDeepDive(data, panel) {

    panel.innerHTML = '<div class="empty"><h3>暂无深度挖掘</h3><p>运行「深度挖掘：标的」获取分析</p></div>';

// free-analysis.js — v8 自由格式·AI自主决定输出逻辑框架和外观样式
// 数据格式: { content: "完整HTML" } → 直接渲染
